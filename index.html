<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F5F4F2;color:#1a1a1a}
input,select,textarea{font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#CC0000!important;box-shadow:0 0 0 2px rgba(204,0,0,.12)}
button{font-family:inherit;cursor:pointer}
button:hover:not(:disabled){filter:brightness(.92)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
@keyframes pulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg{animation:fadeIn .2s ease}
.dot{width:8px;height:8px;border-radius:50%;background:#CC0000;display:inline-block;animation:pulse 1.2s infinite}
.arc-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #f0efed;font-size:13px}
.arc-row:hover{background:#fafaf9}

/* PWA Install Button */
#pwa-install-btn {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #CC0000;
  color: #fff;
  border: none;
  border-radius: 24px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 20px rgba(204,0,0,.4);
  z-index: 9999;
  font-family: 'DM Sans', sans-serif;
  animation: slideUp .3s ease;
}
@keyframes slideUp {
  from { transform: translateX(-50%) translateY(60px); opacity:0; }
  to   { transform: translateX(-50%) translateY(0);    opacity:1; }
}
/* Mobile optimizations */
@media (max-width: 600px) {
  body { font-size: 15px; }
}
/* Standalone mode (installed as app) */
@media (display-mode: standalone) {
  #pwa-install-btn { display: none !important; }
  body { padding-top: env(safe-area-inset-top); }
}
</style>

// PWA Install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install button after app loads
  setTimeout(() => {
    const btn = document.getElementById('pwa-install-btn');
    if(btn) btn.style.display = 'flex';
  }, 2000);
});

window.addEventListener('appinstalled', () => {
  const btn = document.getElementById('pwa-install-btn');
  if(btn) btn.style.display = 'none';
  deferredPrompt = null;
});

function installPWA() {
  if(deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r => {
      deferredPrompt = null;
      const btn = document.getElementById('pwa-install-btn');
      if(btn) btn.style.display = 'none';
    });
  } else {
    // iOS instructions
    alert('iPhone/iPad: Tippe auf das Teilen-Symbol unten, dann "Zum Home-Bildschirm"');
  }
}

<script type="text/babel">

const {useState,useEffect,useRef,useCallback,useMemo}=React;

// Helpers
const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();};
const MONATE=['','Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
function getKW(dateStr){
  if(!dateStr)return 1;
  const parts=dateStr.split('.');
  if(parts.length<3)return 1;
  const dt=new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]));
  const start=new Date(dt.getFullYear(),0,1);
  return Math.ceil(((dt-start)/86400000+start.getDay()+1)/7);
}
function getMonat(dateStr){const m=parseInt((dateStr||'').split('.')[1]);return MONATE[m]||'Unbekannt';}
function getJahr(dateStr){return (dateStr||'').split('.')[2]||new Date().getFullYear().toString();}
const WMO={0:'Klar',1:'Überwiegend klar',2:'Teilweise bewölkt',3:'Bewölkt',45:'Neblig',51:'Nieselregen',61:'Leichter Regen',63:'Regen',65:'Starker Regen',71:'Schneefall',80:'Regenschauer',81:'Regenschauer',82:'Starke Schauer',95:'Gewitter'};
function getN(c){if([80,81,82].includes(c))return'Regenschauer';if([61,63,65].includes(c))return'Dauerregen';if([71,73,75].includes(c))return'Schneefall';return'';}
function getW(k){return k<5?'still':k<30?'mäßiger Wind':'starker Wind';}

// IndexedDB Archive
const DB_NAME='RiedelBauTagebuch';
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('berichte')){
        const s=db.createObjectStore('berichte',{keyPath:'id'});
        s.createIndex('projekt','projekt',{unique:false});
        s.createIndex('datum','datum',{unique:false});
      }
    };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=()=>rej(req.error);
  });
}
async function archiveSave(entry){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction('berichte','readwrite');
    tx.objectStore('berichte').put(entry);
    tx.oncomplete=()=>res(true);
    tx.onerror=()=>rej(tx.error);
  });
}
async function archiveLoad(){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction('berichte','readonly');
    const req=tx.objectStore('berichte').getAll();
    req.onsuccess=()=>res(req.result||[]);
    req.onerror=()=>rej(req.error);
  });
}
async function archiveDelete(id){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction('berichte','readwrite');
    tx.objectStore('berichte').delete(id);
    tx.oncomplete=()=>res(true);
    tx.onerror=()=>rej(tx.error);
  });
}

// Project Store
const LS='rb_proj_v2';
function loadProjects(){try{return JSON.parse(localStorage.getItem(LS)||'null');}catch{return null;}}
function saveProjects(p,a){localStorage.setItem(LS,JSON.stringify({projects:p,activeId:a}));}
const mkForm=()=>({blattNr:'1',datum:todayStr(),arbeitszeit:'07:00 - 16:00 Uhr',baustelle:'',bauNr:'',
  temp7:'',temp12:'',temp16:'',tempMax:'',tempMin:'',niederschlag:'',luftbewegung:'',
  arbeitskraefte:{polier:'',werkpolier:'',vorarbeiter:'',maurer:'',zimmerer:'',betonbauer:'',helfer:'',maschinenpersonal:'',azubis:''},
  geraete:{raupen:false,bagger:false,kraene:false,kompressor:false,verdGeraete:false,lkw:false,betonstahl:false,beton:false},
  besuche:{polier:'',bauleiter:'',bauherr:''},besucheText:'',nachunternehmer:'',ausgefuehrteArbeiten:'',sonstiges:''});
function initProjects(){
  const s=loadProjects();
  if(s&&s.projects&&s.projects.length>0)return s;
  const id=Date.now()+'';
  return{activeId:id,projects:[{id,name:'Neues Projekt',bauNr:'',ort:'',lat:null,lon:null,form:mkForm(),msgs:[],weather:null}]};
}

// Text wrap
function wrapText(text,max){
  if(!text)return[];
  if(!max)max=106;
  const words=text.split(' ');
  var lines=[],cur='';
  for(var i=0;i<words.length;i++){
    var w=words[i];
    var t=cur?cur+' '+w:w;
    if(t.length<=max)cur=t;
    else{if(cur)lines.push(cur);cur=w;}
  }
  if(cur)lines.push(cur);
  return lines;
}

// PDF Builder
function buildPDFDoc(form){
  var {jsPDF}=window.jspdf;
  var doc=new jsPDF({orientation:'portrait',unit:'pt',format:'a4'});
  // jsPDF: y=0 at TOP, increases downward - use coordinates directly
  var R=[204,0,0],BK=[0,0,0],LG=[220,220,220];

  function hl(y,x0,x1,lw,col){
    if(!x0)x0=56.8;if(!x1)x1=566.8;if(!lw)lw=0.5;if(!col)col=BK;
    doc.setDrawColor(col[0],col[1],col[2]);doc.setLineWidth(lw);
    doc.line(x0,y,x1,y);doc.setDrawColor(0,0,0);
  }
  // rbar: draws a filled rect from y downward (h=bh), text centered inside
  function rbar(y,label,x0,x1,bh){
    if(!x0)x0=56.8;if(!x1)x1=566.8;if(!bh)bh=12;
    doc.setFillColor(R[0],R[1],R[2]);doc.rect(x0,y,x1-x0,bh,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,255,255);
    doc.text(label,x0+3,y+bh-3);doc.setTextColor(0,0,0);return y+bh;
  }
  function drawHeader(pt){
    // Logo box top-right: x=450.7, y=18.8, w=51, h=51
    doc.setDrawColor(0,0,0);doc.setLineWidth(0.5);
    doc.rect(450.7,18.8,51,51.1);
    try{doc.addImage(LOGO_PNG,'PNG',452.7,20.8,47,47);}catch(e){}
    // Frame lines
    hl(14.3,56.7,566.9);hl(74.0,56.7,566.9);
    hl(45.6,56.7,443.3);hl(45.6,509.1,566.9);
    // Title
    doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(0,0,0);
    doc.text(pt==='rohbau'?'Bautagebuch - Rohbau':'Bautagebuch - Anhang',56.7,68);
    // Blatt / Datum (below mid-line at y=45.6)
    doc.setFont('helvetica','normal');doc.setFontSize(9);
    doc.text('Blatt-Nr.:  '+(form.blattNr||''),310,57);
    doc.text('Datum:     '+(form.datum||''),310,68);
    // Baustelle row
    doc.text('Baustelle:',56.7,84);doc.text(form.baustelle||'',112,84);
    hl(88,112,564,0.35,LG);
    // Bau-Nr / Arbeitszeit
    doc.text('Bau-Nr.:',56.7,99);doc.text(form.bauNr||'',106,99);
    hl(103,106,376,0.35,LG);
    doc.text('Arbeitszeit:',383.2,99);doc.text(form.arbeitszeit||'',445,99);
    hl(103,445,563.5,0.35,LG);
  }

  function drawRohbau(){
    var Y=112;
    // WETTER section label
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(0,0,0);
    doc.text('Wetter',56.7,Y+8);
    Y+=12;hl(Y,56.8,566.8,0.5);Y+=8;
    // Temperatur
    doc.setFont('helvetica','normal');doc.setFontSize(9);
    doc.text('Temperatur:',56.7,Y+7);
    [[165,'7h',form.temp7],[232,'12h',form.temp12],[305,'16h',form.temp16],[375,'max',form.tempMax],[445,'min',form.tempMin]]
      .forEach(function(t){doc.text(t[1]+'  '+(t[2]||'?'),t[0],Y+7);});Y+=13;
    // Niederschlag
    doc.text('Niederschlag:',56.7,Y+7);
    var nied=form.niederschlag||'';
    [[175,'Regenschauer'],[320,'Dauerregen'],[455,'Schneefall']].forEach(function(n){
      doc.setDrawColor(0,0,0);doc.setLineWidth(0.6);
      doc.rect(n[0],Y,7,7);  // checkbox: top-left at (x, Y)
      if(nied&&nied.toLowerCase().indexOf(n[1].toLowerCase())>=0){
        doc.setFillColor(204,0,0);doc.rect(n[0]+1.5,Y+1.5,4,4,'F');doc.setFillColor(0,0,0);}
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text(n[1],n[0]+10,Y+7);});Y+=13;
    // Luftbewegung
    doc.text('Luftbewegung:',56.7,Y+7);
    var luft=form.luftbewegung||'';

// AI call
async function callClaude(msgs){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:msgs})
  });
  const d=await r.json();return d.content&&d.content[0]?d.content[0].text:'';
}

// Export + Archive
async function doExport(form,setStatus,addMsg,reloadCount){
  setStatus('saving');
  try{
    const doc=buildPDFDoc(form);
    const kw=getKW(form.datum||todayStr());
    const monat=getMonat(form.datum||todayStr());
    const jahr=getJahr(form.datum||todayStr());
    const blatt=String(form.blattNr||1).padStart(3,'0');
    const fn='Bautagebuch_Blatt'+blatt+'_'+(form.datum||todayStr()).replace(/\./g,'-')+'.pdf';
    const pdfBytes=doc.output('arraybuffer');
    const entry={
      id:Date.now()+'',
      projekt:form.baustelle||'Unbekannt',
      bauNr:form.bauNr||'',
      datum:form.datum||todayStr(),
      blattNr:form.blattNr||'1',
      kw:'KW'+pad(kw),
      monat:monat,
      jahr:jahr,
      filename:fn,
      pdfBytes:pdfBytes,
      erstellt:new Date().toISOString()
    };
    await archiveSave(entry);
    doc.save(fn);
    if(reloadCount)reloadCount();
    if(addMsg)addMsg({role:'assistant',content:'Gespeichert: '+fn+' | Archiv: '+form.baustelle+' / '+jahr+' / KW'+pad(kw)});
    setStatus('ok');
  }catch(e){
    console.error('doExport error:',e);
    setStatus('error');
  }
  setTimeout(function(){setStatus(null);},3500);
}

// ZIP Download
async function downloadZip(entries,label){
  const zip=new JSZip();
  entries.forEach(function(e){
    const folder=zip.folder(e.projekt).folder(e.jahr).folder(e.kw);
    folder.file(e.filename,e.pdfBytes);
  });
  const blob=await zip.generateAsync({type:'blob'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='Bautagebuecher_'+label.replace(/\s+/g,'_')+'.zip';a.click();
  URL.revokeObjectURL(url);
}

function ArchivTab(){
  const [eintraege,setEintraege]=useState([]);

  const [filterProjekt,setFilterProjekt]=useState('alle');
  const [view,setView]=useState('kw');

  function laden(){
    setLoading(true);
    archiveLoad().then(function(all){
      all.sort(function(a,b){return b.datum.localeCompare(a.datum);});
      setEintraege(all);setLoading(false);
    });
  }
  useEffect(function(){laden();},[]);

  var projekte=['alle'];
  eintraege.forEach(function(e){if(projekte.indexOf(e.projekt)<0)projekte.push(e.projekt);});
  var gefiltert=eintraege.filter(function(e){return filterProjekt==='alle'||e.projekt===filterProjekt;});

  var grouped={};
  gefiltert.forEach(function(e){
    var key=e.jahr+' / '+(view==='kw'?e.kw:e.monat);
    if(!grouped[key])grouped[key]={label:key,entries:[]};
    grouped[key].entries.push(e);
  });
  var groups=Object.values(grouped).sort(function(a,b){return b.label.localeCompare(a.label);});

  function dlEinzel(e){
    var blob=new Blob([e.pdfBytes],{type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=e.filename;a.click();URL.revokeObjectURL(url);
  }
  function dlGruppe(group){
    var lbl=group.label.replace(/\//g,'-').replace(/\s+/g,'');
    downloadZip(group.entries,lbl);
  }
  function dlAlle(){
    if(gefiltert.length===0)return;
    var lbl=filterProjekt!=='alle'?filterProjekt:'AlleProj';
    downloadZip(gefiltert,lbl+'_Gesamt');

        <button onClick={dlAlle} disabled={gefiltert.length===0} style={{...C.btn('#2E7D32'),opacity:gefiltert.length===0?0.5:1}}>
          ZIP: Alle ({gefiltert.length})
        </button>
      </div>
    </div>
    <div style={{background:'#fff',borderRadius:10,padding:'12px 16px',marginBottom:12,boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
      <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:'#888',marginBottom:3}}>PROJEKT</div>
          <select style={inpS} value={filterProjekt} onChange={function(e){setFilterProjekt(e.target.value);}}>
            {projekte.map(function(p){return <option key={p} value={p}>{p==='alle'?'Alle Projekte':p}</option>;})}

    {loading?(

  const [tab,setTab]=useState('chat');
  const [input,setInput]=useState('');
  const [aiLoad,setAiLoad]=useState(false);
  const [wload,setWload]=useState(false);
  const [geo,setGeo]=useState([]);
  const [ntime,setNtime]=useState('16:30');
  const [non,setNon]=useState(false);
  const [nperm,setNperm]=useState('default');
  const [saveStatus,setSaveStatus]=useState(null);
  const chatEnd=useRef(null);
  const ntRef=useRef(null);
  const histRef=useRef({});

  const proj=activeProj;
  const form=proj.form;
  const msgs=proj.msgs;

  useEffect(function(){if(chatEnd.current)chatEnd.current.scrollIntoView({behavior:'smooth'});},[msgs,activeId]);
  useEffect(function(){if('Notification' in window)setNperm(Notification.permission);},[]);
  useEffect(function(){
    if(ntRef.current)clearTimeout(ntRef.current);
    if(!non||nperm!=='granted')return;
    const parts=ntime.split(':');
    const h=parseInt(parts[0]),m=parseInt(parts[1]);
    const now=new Date(),t=new Date(now);t.setHours(h,m,0,0);if(t<=now)t.setDate(t.getDate()+1);
    ntRef.current=setTimeout(function(){new Notification('Bautagebuch offen!',{body:'Das Bautagebuch fuer '+form.datum+' wurde noch nicht abgeschlossen.'});},t-now);
    return function(){clearTimeout(ntRef.current);};
  },[non,ntime,nperm,form.datum]);

  function searchGeo(q){
    if(!q||q.length<2){setGeo([]);return;}
    fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=5&language=de')
      .then(function(r){return r.json();}).then(function(d){setGeo(d.results||[]);}).catch(function(){});
  }
  function fetchWx(lat,lon,projId){
    setWload(true);
    fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&hourly=temperature_2m,weathercode,windspeed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=Europe/Berlin&forecast_days=1')
      .then(function(r){return r.json();}).then(function(d){
        const code=d.hourly.weathercode[7]||0;
        const avg=(d.hourly.windspeed_10m[7]+d.hourly.windspeed_10m[12]+d.hourly.windspeed_10m[16])/3;
        const w={temp7:Math.round(d.hourly.temperature_2m[7])+'°C',temp12:Math.round(d.hourly.temperature_2m[12])+'°C',
          temp16:Math.round(d.hourly.temperature_2m[16])+'°C',tempMax:Math.round(d.daily.temperature_2m_max[0])+'°C',
          tempMin:Math.round(d.daily.temperature_2m_min[0])+'°C',niederschlag:getN(code),luftbewegung:getW(avg),beschreibung:WMO[code]||'Unbekannt'};
        updateProject(projId,{weather:w});updateForm(projId,w);
        addMsg(projId,{role:'assistant',content:'Wetter: '+w.beschreibung+', '+w.temp7+' bis '+w.tempMax+', '+w.luftbewegung});
        setWload(false);
      }).catch(function(){alert('Wetterdaten nicht verfügbar.');setWload(false);});
  }

  const send=useCallback(function(){
    if(!input.trim()||aiLoad)return;
    const um=input.trim();setInput('');
    addMsg(activeId,{role:'user',content:um});
    if(!histRef.current[activeId])histRef.current[activeId]=[];
    histRef.current[activeId].push({role:'user',content:um});
    setAiLoad(true);
    const sysPrompt='Du bist ein Bautagebuch-Assistent fuer Riedel Bau GmbH. Projekt: '+proj.name+'. Formularstand: '+JSON.stringify(form)+'. Antworte NUR als JSON ohne Backticks: {"antwort":"Bestaetigung auf Deutsch","updates":{"ausgefuehrteArbeiten":"bisheriger+neuer Text oder null","sonstiges":"nur wenn erwaehnt oder null","besucheText":"externe Besucher oder null","nachunternehmer":"nur wenn erwaehnt oder null","arbeitszeit":"nur wenn erwaehnt oder null","arbeitskraefte":{},"besuche":{},"geraete":{}}}';
    const hist=histRef.current[activeId].slice(-8);
    const msgs2=[{role:'user',content:sysPrompt+'\n\nNachricht: '+um}];
    if(hist.length>1)msgs2.unshift.apply(msgs2,hist.slice(0,-1));
    callClaude(msgs2).then(function(raw){
      var p;
      try{p=JSON.parse(raw.replace(/```json|```/g,''));}
      catch(e){p={antwort:'Notiert!',updates:{ausgefuehrteArbeiten:(form.ausgefuehrteArbeiten?form.ausgefuehrteArbeiten+'\n':'')+um}};}
      if(p.updates){
        const u=p.updates,f=Object.assign({},form);
        if(u.ausgefuehrteArbeiten!=null)f.ausgefuehrteArbeiten=u.ausgefuehrteArbeiten;
        if(u.sonstiges)f.sonstiges=u.sonstiges;
        if(u.besucheText)f.besucheText=u.besucheText;
        if(u.nachunternehmer)f.nachunternehmer=u.nachunternehmer;
        if(u.arbeitszeit)f.arbeitszeit=u.arbeitszeit;
        if(u.arbeitskraefte)f.arbeitskraefte=Object.assign({},form.arbeitskraefte,u.arbeitskraefte);
        if(u.besuche)f.besuche=Object.assign({},form.besuche,u.besuche);
        if(u.geraete)f.geraete=Object.assign({},form.geraete,u.geraete);
        updateProject(activeId,{form:f});
      }
      addMsg(activeId,{role:'assistant',content:p.antwort||'Verstanden!'});
      histRef.current[activeId].push({role:'assistant',content:p.antwort});
      setAiLoad(false);
    }).catch(function(){
      addMsg(activeId,{role:'assistant',content:'Verbindungsfehler. Bitte erneut versuchen.'});
      setAiLoad(false);
    });
  },[input,form,aiLoad,activeId,proj.name]);

  var C={
    card:{background:'#fff',borderRadius:10,padding:'16px 18px',marginBottom:14,boxShadow:'0 1px 4px rgba(0,0,0,.07)'},
    sh:{fontWeight:700,fontSize:12,letterSpacing:1,textTransform:'uppercase',color:'#CC0000',marginBottom:10},
    lb:{fontSize:11,fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:3},
    inp:{width:'100%',padding:'7px 10px',border:'1.5px solid #e0ddd8',borderRadius:6,fontSize:13,background:'#fafaf9',boxSizing:'border-box'},
    ta:{width:'100%',padding:'8px 10px',border:'1.5px solid #e0ddd8',borderRadius:6,fontSize:13,background:'#fafaf9',boxSizing:'border-box',resize:'vertical'},
    btn:function(c){return{background:c||'#CC0000',color:'#fff',border:'none',borderRadius:7,padding:'9px 18px',cursor:'pointer',fontWeight:700,fontSize:13};}
  };
  var AK=[['polier','Polier'],['werkpolier','Werkpolier'],['vorarbeiter','Vorarbeiter'],['maurer','Maurer'],['zimmerer','Zimmerer'],['betonbauer','Betonbauer'],['helfer','Helfer'],['maschinenpersonal','Masch.Pers.'],['azubis','Azubis']];
  var GF=[['raupen','Raupen'],['bagger','Bagger'],['kraene','Kräne'],['kompressor','Kompressor'],['verdGeraete','Verd. Geräte'],['lkw','LKW'],['betonstahl','Betonstahl'],['beton','Beton']];
  var btnLabel=saveStatus==='saving'?'Speichert...':saveStatus==='ok'?'Gespeichert!':saveStatus==='error'?'Fehler!':'PDF + Archiv';

  return(
  <div style={{fontFamily:"'DM Sans',sans-serif",minHeight:'100vh',background:'#F5F4F2'}}>
    <div style={{background:'#CC0000',color:'#fff',padding:'11px 20px',display:'flex',alignItems:'center',gap:12,boxShadow:'0 2px 12px rgba(200,0,0,.3)'}}>
      <img src={LOGO_PNG} style={{width:36,height:36,objectFit:'contain',background:'#fff',borderRadius:6,padding:2}} alt="Logo"/>
      <div>
        <div style={{fontWeight:800,fontSize:16,letterSpacing:.5}}>BAUTAGEBUCH BOT</div>
        <div style={{fontSize:11,opacity:.85}}>Riedel Bau GmbH · {todayStr()} · {proj.name}</div>
      </div>
      {proj.weather&&<div style={{marginLeft:'auto',background:'rgba(255,255,255,.18)',borderRadius:6,padding:'4px 12px',fontSize:12,marginRight:8}}>
        {proj.weather.beschreibung} · {proj.weather.temp7} - {proj.weather.tempMax}
      </div>}
      <button onClick={function(){doExport(form,setSaveStatus,function(m){addMsg(activeId,m);},reloadArchiveCount);}}
        disabled={saveStatus==='saving'}
        style={{...C.btn('#fff'),color:'#CC0000',marginLeft:proj.weather?0:'auto',opacity:saveStatus==='saving'?0.6:1,minWidth:130}}>
        {btnLabel}
      </button>
    </div>
    <ProjectSwitcher projects={projects} activeId={activeId}
      onSwitch={switchProject} onAdd={addProject} onRename={renameProject} onDelete={deleteProject}/>
    <div style={{display:'flex',gap:2,background:'#e8e5e0',padding:'6px 20px 0'}}>
      {[['chat','Chat'],['form','Formular'],['archiv','Archiv ('+archiveCount+')'],['setup','Einstellungen']].map(function(t){return(
        <button key={t[0]} onClick={function(){setTab(t[0]);}}
          style={{padding:'9px 18px',border:'none',borderRadius:'8px 8px 0 0',cursor:'pointer',
            background:tab===t[0]?'#fff':'transparent',color:tab===t[0]?'#CC0000':'#666',
            fontWeight:tab===t[0]?700:500,fontSize:13,
            borderBottom:tab===t[0]?'2px solid #CC0000':'2px solid transparent'}}>{t[1]}</button>
      );})}
    </div>
    <div style={{padding:'16px 20px',maxWidth:900,margin:'0 auto'}}>

    {tab==='chat'&&(
      <div>
        {!proj.lat&&<div style={{...C.card,background:'#F0F4FF',border:'1px solid #c0d0f0',textAlign:'center',padding:'12px',marginBottom:14}}>
          <span style={{fontSize:13,color:'#3050A0'}}>Baustellenort unter Einstellungen eingeben für automatisches Wetter.</span>
        </div>}
        {!proj.weather&&proj.lat&&<div style={{...C.card,background:'#FFF8F0',border:'1px solid #f0e0c0',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <span style={{fontSize:13,color:'#8B6914'}}>Wetter für {proj.name} noch nicht geladen</span>
          <button onClick={function(){fetchWx(proj.lat,proj.lon,activeId);}} disabled={wload} style={C.btn('#E6820A')}>{wload?'Lädt...':'Jetzt laden'}</button>
        </div>}
        <div style={{...C.card,minHeight:340,maxHeight:420,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:10}}>
          {msgs.length===0&&<div style={{margin:'auto',textAlign:'center',color:'#bbb'}}>
            <div style={{fontSize:36,marginBottom:8}}>💬</div>
            <div style={{fontWeight:700,fontSize:14,color:'#999'}}>Projekt: {proj.name}</div>
            <div style={{fontSize:12,color:'#ccc',marginTop:6}}>z.B. "3 Maurer haben die Bodenplatte betoniert, Bauleiter Fischer war vor Ort"</div>
          </div>}
          {msgs.map(function(m,i){return(
            <div key={i} className="msg" style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',gap:6}}>
              {m.role==='assistant'&&<span style={{fontSize:18,alignSelf:'flex-end'}}>Bot</span>}
              <div style={{maxWidth:'78%',padding:'10px 14px',fontSize:14,lineHeight:1.5,whiteSpace:'pre-wrap',
                borderRadius:m.role==='user'?'14px 14px 2px 14px':'14px 14px 14px 2px',
                background:m.role==='user'?'#CC0000':'#F0EFED',color:m.role==='user'?'#fff':'#1a1a1a'}}>{m.content}</div>
            </div>
          );})}
          {aiLoad&&<div style={{display:'flex',gap:5,padding:8}}>{[0,1,2].map(function(i){return <div key={i} className="dot" style={{animationDelay:i*.2+'s'}}/>;})}</div>}
          <div ref={chatEnd}/>
        </div>
        <div style={{display:'flex',gap:8,marginTop:4}}>
          <input value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter'&&!e.shiftKey)send();}}
            placeholder={proj.name+' - Was wurde heute gemacht?'}
            style={{...C.inp,flex:1,padding:'12px 14px',fontSize:14,borderRadius:8}}/>
          <button onClick={send} disabled={aiLoad||!input.trim()} style={{...C.btn(),padding:'12px 22px',fontSize:17,opacity:aiLoad||!input.trim()?0.5:1}}>→</button>
        </div>
        <div style={{fontSize:11,color:'#aaa',marginTop:5}}>Formular wird automatisch ausgefüllt · PDF + Archiv oben rechts</div>
      </div>
    )}

    {tab==='form'&&(
      <div>
        <div style={{...C.card,background:'#FFF8F0',border:'1px solid #f0ddb0',padding:'10px 16px',marginBottom:10}}>
          <span style={{fontSize:13,color:'#8B6914',fontWeight:600}}>Aktives Projekt: {proj.name}</span>
        </div>
        <div style={C.card}><div style={C.sh}>Kopfdaten</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
            {[['blattNr','Blatt-Nr.'],['datum','Datum'],['arbeitszeit','Arbeitszeit']].map(function(k){return(
              <div key={k[0]}><label style={C.lb}>{k[1]}</label><input style={C.inp} value={form[k[0]]} onChange={function(e){updateForm(activeId,{[k[0]]:e.target.value});}}/></div>
            );})}
          </div>
        </div>
        <div style={C.card}>
          <div style={{...C.sh,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>Wetter</span>
            {proj.lat&&<button onClick={function(){fetchWx(proj.lat,proj.lon,activeId);}} disabled={wload} style={{...C.btn('#1565C0'),fontSize:11,padding:'4px 10px'}}>{wload?'Lädt...':'Aktualisieren'}</button>}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:10}}>
            {[['temp7','7h'],['temp12','12h'],['temp16','16h'],['tempMax','Max'],['tempMin','Min']].map(function(k){return(
              <div key={k[0]}><label style={C.lb}>{k[1]}</label><input style={C.inp} value={form[k[0]]} onChange={function(e){updateForm(activeId,{[k[0]]:e.target.value});}}/></div>
            );})}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={C.lb}>Niederschlag</label>
              <select style={C.inp} value={form.niederschlag} onChange={function(e){updateForm(activeId,{niederschlag:e.target.value});}}>
                <option value="">—</option><option>Regenschauer</option><option>Dauerregen</option><option>Schneefall</option></select></div>
            <div><label style={C.lb}>Luftbewegung</label>
              <select style={C.inp} value={form.luftbewegung} onChange={function(e){updateForm(activeId,{luftbewegung:e.target.value});}}>
                <option value="">—</option><option>still</option><option>mäßiger Wind</option><option>starker Wind</option></select></div>
          </div>
        </div>
        <div style={C.card}><div style={C.sh}>Arbeitskräfte (m/w/d)</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {AK.map(function(k){return(
              <div key={k[0]}><label style={C.lb}>{k[1]}</label><input type="number" min="0" style={C.inp} value={form.arbeitskraefte[k[0]]} onChange={function(e){updateAK(activeId,k[0],e.target.value);}}/></div>
            );})}
          </div>
        </div>
        <div style={C.card}><div style={C.sh}>Geräte und Baustoffe</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {GF.map(function(k){return(
              <label key={k[0]} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',
                background:form.geraete[k[0]]?'#FFE8E8':'#f5f4f2',border:'1.5px solid '+(form.geraete[k[0]]?'#CC0000':'#e0ddd8'),
                borderRadius:6,padding:'5px 10px',fontSize:13,fontWeight:form.geraete[k[0]]?700:400}}>
                <input type="checkbox" checked={form.geraete[k[0]]} onChange={function(e){updateG(activeId,k[0],e.target.checked);}} style={{accentColor:'#CC0000'}}/>{k[1]}</label>
            );})}
          </div>
        </div>
        <div style={C.card}><div style={C.sh}>Nachunternehmer</div>
          <textarea style={{...C.ta,height:80}} value={form.nachunternehmer} onChange={function(e){updateForm(activeId,{nachunternehmer:e.target.value});}}/></div>
        <div style={C.card}><div style={C.sh}>Ausgeführte Arbeiten</div>
          <textarea style={{...C.ta,height:130}} value={form.ausgefuehrteArbeiten} onChange={function(e){updateForm(activeId,{ausgefuehrteArbeiten:e.target.value});}} placeholder="Automatisch aus dem Chat befüllt..."/></div>
        <div style={C.card}><div style={C.sh}>Sonstiges</div>
          <textarea style={{...C.ta,height:70}} value={form.sonstiges} onChange={function(e){updateForm(activeId,{sonstiges:e.target.value});}}/></div>
        <div style={C.card}><div style={C.sh}>Besuche</div>
          <textarea style={{...C.ta,height:55}} value={form.besucheText} onChange={function(e){updateForm(activeId,{besucheText:e.target.value});}} placeholder="z.B. Architekt Hofmann - Besprechung Fassade"/></div>
        <div style={C.card}><div style={C.sh}>Unterschriften</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
            {[['polier','Polier'],['bauleiter','Bauleiter'],['bauherr','Bauherr']].map(function(k){return(
              <div key={k[0]}><label style={C.lb}>{k[1]}</label><input style={C.inp} value={form.besuche[k[0]]} onChange={function(e){updateBes(activeId,k[0],e.target.value);}} placeholder="Name"/></div>
            );})}
          </div>
        </div>
        <button onClick={function(){doExport(form,setSaveStatus,function(m){addMsg(activeId,m);},reloadArchiveCount);}}
          disabled={saveStatus==='saving'} style={{...C.btn(),width:'100%',padding:14,fontSize:15,opacity:saveStatus==='saving'?0.7:1}}>
          {btnLabel}
        </button>
      </div>
    )}

    {tab==='archiv'&&<ArchivTab/>}

    {tab==='setup'&&(
      <div>
        <div style={C.card}><div style={C.sh}>Projekt: {proj.name}</div>
          <div style={{display:'grid',gap:10}}>
            <div><label style={C.lb}>Projektname / BVH</label>
              <input style={C.inp} value={proj.name} onChange={function(e){renameProject(activeId,e.target.value);}}/></div>
            <div><label style={C.lb}>Bau-Nr.</label>
              <input style={C.inp} value={proj.bauNr||''} onChange={function(e){updateProject(activeId,{bauNr:e.target.value,form:{...form,bauNr:e.target.value}});}}/></div>
            <div>
              <label style={C.lb}>Ort (für Wetter)</label>
              <input style={C.inp} value={proj.ort||''} onChange={function(e){updateProject(activeId,{ort:e.target.value});searchGeo(e.target.value);}} placeholder="z.B. München"/>
              {geo.length>0&&<div style={{background:'#fff',border:'1px solid #e0ddd8',borderRadius:6,marginTop:4,overflow:'hidden'}}>
                {geo.map(function(r){return(
                  <div key={r.id} onClick={function(){updateProject(activeId,{ort:r.name+(r.admin1?', '+r.admin1:''),lat:r.latitude,lon:r.longitude});setGeo([]);}}
                    style={{padding:'9px 12px',cursor:'pointer',fontSize:13,borderBottom:'1px solid #f0efed'}}>
                    {r.name}{r.admin1?', '+r.admin1:''}{r.country?', '+r.country:''}</div>
                );})}
              </div>}
            </div>
            <button onClick={function(){if(proj.lat)fetchWx(proj.lat,proj.lon,activeId);}} disabled={!proj.lat||wload} style={{...C.btn('#1565C0'),opacity:!proj.lat?0.4:1}}>
              {wload?'Lädt...':'Wetter laden'}</button>
            <button onClick={function(){updateForm(activeId,{baustelle:proj.name,bauNr:proj.bauNr||''}); }} style={C.btn('#2E7D32')}>
              Ins Formular übernehmen</button>
          </div>
        </div>
        <div style={C.card}><div style={C.sh}>Alle Projekte</div>
          <div style={{display:'grid',gap:8}}>
            {projects.map(function(p){return(
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',
                background:p.id===activeId?'#FFF0F0':'#fafaf9',borderRadius:8,border:'1.5px solid '+(p.id===activeId?'#CC0000':'#e0ddd8')}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
                  <div style={{fontSize:11,color:'#888'}}>{p.bauNr||'Keine Bau-Nr.'} · {p.ort||'Kein Ort'}</div>
                </div>
                {p.id===activeId?<span style={{fontSize:11,color:'#CC0000',fontWeight:700}}>AKTIV</span>:
                  <button onClick={function(){switchProject(p.id);}} style={{...C.btn('#555'),fontSize:11,padding:'4px 10px'}}>Wechseln</button>}
              </div>
            );})}
          </div>
          <button onClick={addProject} style={{...C.btn('#2E7D32'),width:'100%',marginTop:10}}>+ Neues Projekt anlegen</button>
        </div>
        <div style={C.card}><div style={C.sh}>Tagesend-Erinnerung</div>
          {nperm!=='granted'?(
            <div><p style={{fontSize:13,color:'#555',marginBottom:10}}>Erinnerung wenn das Bautagebuch noch offen ist.</p>
              <button onClick={function(){Notification.requestPermission().then(function(p){setNperm(p);if(p==='granted')setNon(true);});}} style={C.btn()}>Erlauben</button></div>
          ):(
            <div style={{display:'grid',gap:12}}>
              <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
                <input type="checkbox" checked={non} onChange={function(e){setNon(e.target.checked);}} style={{width:18,height:18,accentColor:'#CC0000'}}/>
                <span style={{fontWeight:600}}>Tägliche Erinnerung aktiv</span></label>
              <div><label style={C.lb}>Uhrzeit</label><input type="time" style={{...C.inp,maxWidth:150}} value={ntime} onChange={function(e){setNtime(e.target.value);}}/></div>
              {non&&<div style={{background:'#E8F5E9',borderRadius:6,padding:'10px 14px',fontSize:13,color:'#2E7D32'}}>Aktiv täglich um {ntime} Uhr</div>}
            </div>
          )}
        </div>
        <div style={{...C.card,background:'#F0F8FF',border:'1px solid #c0d8f0'}}><div style={C.sh}>Desktop-Verknüpfung (Chrome)</div>
          <ol style={{fontSize:13,color:'#555',lineHeight:2.2,paddingLeft:20}}>
            <li>Diese Seite in Chrome öffnen</li>
            <li>Menü oben rechts → Weitere Tools → Verknüpfung erstellen</li>
            <li>Haken bei "Als Fenster öffnen" setzen</li>
          </ol>
        </div>
      </div>
    )}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
