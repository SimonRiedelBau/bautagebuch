<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── Supabase Config ──────────────────────────────────────────────

// Minimal Supabase client (no npm needed)
// Unified, tested Supabase client
const SB_URL='https://dlypbcdoxlfyyavmrhlr.supabase.co';
const SB_KEY='sb_publishable_VI2Oei75votfVOgtuVIcmw_K5-lAeLi';

const sb={
  _h:(token)=>({
    'Content-Type':'application/json',
    'apikey':SB_KEY,
    'Authorization':'Bearer '+(token||SB_KEY)
  }),
  async signIn(email,pw){
    const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{
      method:'POST',headers:sb._h(null),body:JSON.stringify({email,password:pw})
    });
    const d=await r.json();
    // Store refresh token
    if(d.refresh_token)localStorage.setItem('sb_refresh',d.refresh_token);
    return d;
  },
  async refresh(){
    const rt=localStorage.getItem('sb_refresh');
    if(!rt)return null;
    try{
      const r=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{
        method:'POST',headers:sb._h(null),body:JSON.stringify({refresh_token:rt})
      });
      const d=await r.json();
      if(d.access_token){
        localStorage.setItem('sb_token',d.access_token);
        if(d.refresh_token)localStorage.setItem('sb_refresh',d.refresh_token);
        return d.access_token;
      }
    }catch(e){console.error('Refresh failed:',e);}
    return null;
  },
  async safeRequest(fn){
    try{return await fn();}
    catch(e){
      if(e.message&&(e.message.includes('JWT')||e.message.includes('expired')||e.message.includes('Invalid'))){
        console.log('Token expired, refreshing...');
        const newToken=await sb.refresh();
        if(newToken){
          // Update token in localStorage
          return await fn(newToken);
        }
      }
      throw e;
    }
  },
  async signUp(email,pw,name){
    const r=await fetch(SB_URL+'/auth/v1/signup',{
      method:'POST',headers:sb._h(null),
      body:JSON.stringify({email,password:pw,data:{full_name:name}})
    });
    return r.json();
  },
  async signOut(token){
    await fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:sb._h(token)});
  },
  async select(table,token,filter='',cols='*'){
    const doReq=async(tok)=>{
      const url=SB_URL+'/rest/v1/'+table+'?select='+cols+(filter?'&'+filter:'');
      const r=await fetch(url,{headers:{...sb._h(tok||token),'Prefer':'return=representation'}});
      const d=await r.json();
      if(d&&d.message)throw new Error(d.message);
      return Array.isArray(d)?d:[];
    };
    return sb.safeRequest(doReq);
  },
  async insert(table,token,data){
    const doReq=async(tok)=>{
      const r=await fetch(SB_URL+'/rest/v1/'+table,{
        method:'POST',
        headers:{...sb._h(tok||token),'Prefer':'return=representation'},
        body:JSON.stringify(data)
      });
      const d=await r.json();
      if(d&&d.message)throw new Error(d.message);
      return Array.isArray(d)?d[0]:d;
    };
    return sb.safeRequest(doReq);
  },
  async update(table,token,data,filter){
    const doReq=async(tok)=>{
      const r=await fetch(SB_URL+'/rest/v1/'+table+'?'+filter,{
        method:'PATCH',
        headers:{...sb._h(tok||token),'Prefer':'return=representation'},
        body:JSON.stringify(data)
      });
      const d=await r.json();
      if(d&&d.message)throw new Error(d.message);
      return Array.isArray(d)?d[0]:d;
    };
    return sb.safeRequest(doReq);
  },
  async rpc(fn,token,params){
    const r=await fetch(SB_URL+'/rest/v1/rpc/'+fn,{
      method:'POST',headers:sb._h(token),body:JSON.stringify(params)
    });
    return r.json();
  }
};

// ── Helpers ──────────────────────────────────────────────────────
const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();};
const todayISO=()=>new Date().toISOString().split('T')[0];
const WMO={0:'Klar',1:'Überwiegend klar',2:'Teilweise bewölkt',3:'Bewölkt',45:'Neblig',
  51:'Nieselregen',61:'Leichter Regen',63:'Regen',65:'Starker Regen',
  71:'Schneefall',80:'Regenschauer',82:'Starke Schauer',95:'Gewitter'};
function getN(c){if([80,81,82].includes(c))return'Regenschauer';if([61,63,65].includes(c))return'Dauerregen';if([71,73,75].includes(c))return'Schneefall';return'';}
function getW(k){return k<5?'still':k<30?'maeßiger Wind':'starker Wind';}

function wrapText(text,max){
  if(!text)return[];if(!max)max=106;
  var words=text.split(' '),lines=[],cur='';
  for(var i=0;i<words.length;i++){
    var t=cur?cur+' '+words[i]:words[i];
    if(t.length<=max)cur=t;else{if(cur)lines.push(cur);cur=words[i];}
  }
  if(cur)lines.push(cur);return lines;
}

}

async function callClaude(msgs){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:msgs})
  });
  const d=await r.json();return d.content&&d.content[0]?d.content[0].text:'';
}

// ── Login Screen ──────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [name,setName]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  async function submit(){
    if(!email||!pw){setErr('Bitte E-Mail und Passwort eingeben');return;}
    setLoading(true);setErr('');
    try{
      var res;
      if(mode==='login'){
        res=await sb.signIn(email,pw);
      } else {
        if(!name){setErr('Bitte Namen eingeben');setLoading(false);return;}
        res=await sb.signUp(email,pw,name);
      }
      if(res.error||res.message){
        setErr(res.error_description||res.message||'Fehler beim Anmelden');
      } else if(res.access_token){
        localStorage.setItem('sb_token',res.access_token);
        localStorage.setItem('sb_user',JSON.stringify(res.user));
        onLogin(res.access_token,res.user);
      } else {
        setErr('Bitte E-Mail bestätigen und dann einloggen');
      }
    }catch(e){setErr('Verbindungsfehler: '+e.message);}
    setLoading(false);
  }

  const S={
    wrap:{minHeight:'100vh',background:'#F5F4F2',display:'flex',alignItems:'center',justifyContent:'center',padding:20},
    card:{background:'#fff',borderRadius:16,padding:'40px 36px',maxWidth:400,width:'100%',boxShadow:'0 4px 24px rgba(0,0,0,.1)'},
    inp:{width:'100%',padding:'11px 14px',border:'1.5px solid #e0ddd8',borderRadius:8,fontSize:14,fontFamily:'inherit',boxSizing:'border-box',marginBottom:12},
    btn:{width:'100%',padding:14,background:'#CC0000',color:'#fff',border:'none',borderRadius:8,fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:'inherit'},
    err:{background:'#FFF0F0',border:'1px solid #ffcccc',borderRadius:6,padding:'10px 14px',fontSize:13,color:'#CC0000',marginBottom:12},
  };

  return(
  <div style={S.wrap}>
    <div style={S.card}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <img src={LOGO_PNG} style={{width:64,height:64,objectFit:'contain',marginBottom:12}}/>
        <div style={{fontWeight:800,fontSize:22,color:'#1a1a1a'}}>Bautagebuch Bot</div>
        <div style={{fontSize:13,color:'#888',marginTop:4}}>Riedel Bau GmbH</div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {[['login','Anmelden'],['signup','Registrieren']].map(function(t){return(
          <button key={t[0]} onClick={function(){setMode(t[0]);setErr('');}}
            style={{flex:1,padding:'9px',border:'none',borderRadius:7,cursor:'pointer',fontWeight:600,fontSize:13,fontFamily:'inherit',
              background:mode===t[0]?'#CC0000':'#f0efed',color:mode===t[0]?'#fff':'#555'}}>
            {t[1]}
          </button>
        );})}
      </div>
      {err&&<div style={S.err}>{err}</div>}
      {mode==='signup'&&<input style={S.inp} placeholder="Vollständiger Name" value={name} onChange={function(e){setName(e.target.value);}}/>}
      <input style={S.inp} placeholder="E-Mail" type="email" value={email} onChange={function(e){setEmail(e.target.value);}}/>
      <input style={S.inp} placeholder="Passwort" type="password" value={pw} onChange={function(e){setPw(e.target.value);}}
        onKeyDown={function(e){if(e.key==='Enter')submit();}}/>
      <button style={S.btn} onClick={submit} disabled={loading}>
        {loading?'Laden...':(mode==='login'?'Anmelden':'Registrieren')}
      </button>
      <div style={{fontSize:11,color:'#aaa',textAlign:'center',marginTop:16,lineHeight:1.6}}>
        Beim ersten Login bitte E-Mail bestätigen.<br/>
        Dann kann der Projektleiter die Rolle zuweisen.
      </div>
    </div>
  </div>);
}

// ── Projekt Einstellungen Component ──────────────────────────────
function ProjektEinstellungen({projekt,token,onUpdate}){
  var [name,setName]=useState(projekt.name||'');
  var [bauNr,setBauNr]=useState(projekt.bau_nr||'');
  var [ort,setOrt]=useState(projekt.ort||'');
  var [geo,setGeo]=useState([]);
  var [lat,setLat]=useState(projekt.lat||null);
  var [lon,setLon]=useState(projekt.lon||null);
  var [saving,setSaving]=useState(false);
  var [saved,setSaved]=useState(false);

  useEffect(function(){
    setName(projekt.name||'');
    setBauNr(projekt.bau_nr||'');
    setOrt(projekt.ort||'');
    setLat(projekt.lat||null);
    setLon(projekt.lon||null);
  },[projekt.id]);

  function searchGeo(q){
    if(!q||q.length<2){setGeo([]);return;}
    fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=5&language=de')
      .then(function(r){return r.json();}).then(function(d){setGeo(d.results||[]);}).catch(function(){});
  }

  async function save(){
    setSaving(true);
    try{
      var payload={name:name};
      if(bauNr)payload.bau_nr=bauNr;
      if(ort)payload.ort=ort;
      if(lat)payload.lat=lat;
      if(lon)payload.lon=lon;
      var updated=await sb.update('projekte',token,payload,'id=eq.'+projekt.id);
      onUpdate(updated||{...projekt,...payload});
      setSaved(true);
      setTimeout(function(){setSaved(false);},2000);
    }catch(e){alert('Fehler beim Speichern: '+e.message);}
    setSaving(false);
  }

  var inp={width:'100%',padding:'7px 10px',border:'1.5px solid #e0ddd8',borderRadius:6,
    fontSize:13,background:'#fafaf9',boxSizing:'border-box',marginBottom:10,fontFamily:'inherit'};
  var lb={fontSize:11,fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:3};

  return(
  <div style={{background:'#fff',borderRadius:10,padding:'16px 18px',marginBottom:14,boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
    <div style={{fontWeight:700,fontSize:12,letterSpacing:1,textTransform:'uppercase',color:'#CC0000',marginBottom:12}}>
      Projektdetails
    </div>
    <label style={lb}>Projektname / BVH-Bezeichnung</label>
    <input style={inp} value={name} onChange={function(e){setName(e.target.value);}}/>
    <label style={lb}>Bau-Nr.</label>
    <input style={inp} value={bauNr} onChange={function(e){setBauNr(e.target.value);}} placeholder="z.B. 7421341"/>
    <label style={lb}>Ort der Baustelle (für automatisches Wetter)</label>
    <input style={inp} value={ort} onChange={function(e){setOrt(e.target.value);searchGeo(e.target.value);}} placeholder="z.B. München"/>
    {geo.length>0&&(
      <div style={{background:'#fff',border:'1px solid #e0ddd8',borderRadius:6,marginBottom:10,overflow:'hidden'}}>
        {geo.map(function(r){return(
          <div key={r.id} onClick={function(){
            setOrt(r.name+(r.admin1?', '+r.admin1:''));
            setLat(r.latitude);setLon(r.longitude);setGeo([]);
          }} style={{padding:'9px 12px',cursor:'pointer',fontSize:13,borderBottom:'1px solid #f0efed'}}>
            {r.name}{r.admin1?', '+r.admin1:''}{r.country?', '+r.country:''}
          </div>
        );})}
      </div>
    )}
    {lat&&<div style={{fontSize:12,color:'#2E7D32',marginBottom:10}}>
      Koordinaten gesetzt: {lat.toFixed(4)}, {lon.toFixed(4)}
    </div>}
    <button onClick={save} disabled={saving}
      style={{width:'100%',padding:10,background:saved?'#2E7D32':'#CC0000',color:'#fff',border:'none',
        borderRadius:7,cursor:'pointer',fontWeight:700,fontSize:13,fontFamily:'inherit',
        opacity:saving?.7:1,transition:'background .3s'}}>
      {saving?'Speichert...':saved?'Gespeichert!':'Einstellungen speichern'}
    </button>
  </div>);
}


// ── ZIP + PDF Download ────────────────────────────────────────────
async function dlZip(entries, label){
  var zip=new JSZip();
  entries.forEach(function(b){
    var datum=b.datum?new Date(b.datum).toLocaleDateString('de-DE').replace(/\./g,'-'):'';
    var fn='Bautagebuch_'+b.projekt_name.replace(/\s+/g,'_')+'_Blatt'+String(b.blatt_nr).padStart(3,'0')+'_'+datum+'.pdf';
    var folder=zip.folder(b.projekt_name).folder(b.jahr||'2026').folder(b.kw||'KW01');
    var doc=buildEinfachesPDF(b);
    folder.file(fn, doc.output('arraybuffer'));
  });
  var blob=await zip.generateAsync({type:'blob'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='Bautagebuecher_'+label.replace(/[\s\/]/g,'_')+'.zip';a.click();
  URL.revokeObjectURL(url);
}

function dlEinzelPDF(b){
  var doc=buildEinfachesPDF(b);
  var datum=b.datum?new Date(b.datum).toLocaleDateString('de-DE').replace(/\./g,'-'):'';
  doc.save('Bautagebuch_Blatt'+String(b.blatt_nr).padStart(3,'0')+'_'+datum+'.pdf');
}

function buildEinfachesPDF(b){
  // Reconstruct form object from bericht DB row
  var form={
    datum:b.datum?new Date(b.datum).toLocaleDateString('de-DE'):'',
    arbeitszeit:b.arbeitszeit||'07:00 - 16:00 Uhr',
    temp7:b.temp_7h||'',temp12:b.temp_12h||'',temp16:b.temp_16h||'',
    tempMax:b.temp_max||'',tempMin:b.temp_min||'',
    niederschlag:b.niederschlag||'',luftbewegung:b.luftbewegung||'',
    arbeitskraefte:{polier:b.ak_polier||'',werkpolier:b.ak_werkpolier||'',
      vorarbeiter:b.ak_vorarbeiter||'',maurer:b.ak_maurer||'',
      zimmerer:b.ak_zimmerer||'',betonbauer:b.ak_betonbauer||'',
      helfer:b.ak_helfer||'',maschinenpersonal:b.ak_maschinenpersonal||'',azubis:b.ak_azubis||''},
    geraete:{raupen:b.g_raupen_anzahl||0,bagger:b.g_bagger_anzahl||0,
      kraene:b.g_kraene_anzahl||0,kompressor:b.g_kompressor_anzahl||0,
      verdGeraete:b.g_verd_geraete_anzahl||0,lkw:b.g_lkw_anzahl||0,
      betonstahl:b.g_betonstahl_anzahl||0,beton:b.g_beton_anzahl||0},
    besuche:{polier:b.polier_name||'',bauleiter:b.bauleiter_name||'',bauherr:b.bauherr_name||''},
    besucheText:b.besuche_text||'',nachunternehmer:b.nachunternehmer||'',
    ausgefuehrteArbeiten:b.ausgefuehrte_arbeiten||'',sonstiges:b.sonstiges||''
  };
  return buildPDFDoc(form,b.projekt_name||'',b.projekte?b.projekte.bau_nr||'':'',b.blatt_nr||1);
}


// ── Hauptapp ──────────────────────────────────────────────────────
function App(){
  // Auth state
  const [token,setToken]=useState(function(){return localStorage.getItem('sb_token')||null;});
  const [user,setUser]=useState(function(){try{return JSON.parse(localStorage.getItem('sb_user')||'null');}catch{return null;}});
  const [profil,setProfil]=useState(null);

  // App state
  const [tab,setTab]=useState('chat');
  const [projekte,setProjekte]=useState([]);
  const [aktivProjekt,setAktivProjekt]=useState(null);
  const [form,setForm]=useState(mkForm());
  const [blattNr,setBlattNr]=useState(1);
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState('');
  const [aiLoad,setAiLoad]=useState(false);
  const [wload,setWload]=useState(false);
  const [geo,setGeo]=useState([]);
  const [saveStatus,setSaveStatus]=useState(null);
  const [fehlend,setFehlend]=useState([]);
  const [zeigFehlend,setZeigFehlend]=useState(false);
  const [archiv,setArchiv]=useState([]);
  const [archivLoad,setArchivLoad]=useState(false);
  const [archivFilter,setArchivFilter]=useState({projekt:'alle',jahr:'alle',kw:'alle',monat:'alle'});
  const [archivView,setArchivView]=useState('kw');

  // Computed archive values
  const MONATE_LIST=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const archivMitMeta=useMemo(function(){
    return archiv.map(function(b){
      var d=b.datum?new Date(b.datum):new Date();
      var kw=Math.ceil(((d-new Date(d.getFullYear(),0,1))/86400000+new Date(d.getFullYear(),0,1).getDay()+1)/7);
      return {...b,
        jahr:String(d.getFullYear()),
        kw:'KW'+String(kw).padStart(2,'0'),
        monat:MONATE_LIST[d.getMonth()],
        projekt_name:aktivProjekt?aktivProjekt.name:'',
      };
    });
  },[archiv,aktivProjekt]);
  const archivProjekte=useMemo(function(){return['alle',...new Set(archivMitMeta.map(b=>b.projekt_name))].filter(Boolean);},[archivMitMeta]);
  const archivJahre=useMemo(function(){return['alle',...new Set(archivMitMeta.map(b=>b.jahr)).values()].sort((a,b)=>b>a?1:-1);},[archivMitMeta]);
  const archivKWs=useMemo(function(){return[...new Set(archivMitMeta.filter(b=>archivFilter.jahr==='alle'||b.jahr===archivFilter.jahr).map(b=>b.kw))].sort();},[archivMitMeta,archivFilter.jahr]);
  const archivMonate=useMemo(function(){return[...new Set(archivMitMeta.filter(b=>archivFilter.jahr==='alle'||b.jahr===archivFilter.jahr).map(b=>b.monat))];},[archivMitMeta,archivFilter.jahr]);
  const archivGefiltert=useMemo(function(){
    return archivMitMeta.filter(function(b){
      if(archivFilter.projekt!=='alle'&&b.projekt_name!==archivFilter.projekt)return false;
      if(archivFilter.jahr!=='alle'&&b.jahr!==archivFilter.jahr)return false;
      if(archivView==='kw'&&archivFilter.kw!=='alle'&&b.kw!==archivFilter.kw)return false;
      if(archivView==='monat'&&archivFilter.monat!=='alle'&&b.monat!==archivFilter.monat)return false;
      return true;
    });
  },[archivMitMeta,archivFilter,archivView]);
  const archivGruppen=useMemo(function(){
    var g={};
    archivGefiltert.forEach(function(b){
      var key=b.jahr+(archivView==='kw'?' / '+b.kw:' / '+b.monat);
      if(!g[key])g[key]={label:key,berichte:[]};
      g[key].berichte.push(b);
    });
    return Object.values(g).sort((a,b)=>b.label>a.label?1:-1);
  },[archivGefiltert,archivView]);

  // Voice recording
  const [recording,setRecording]=useState(false);
  const [recorder,setRecorder]=useState(null);
  const mediaRef=useRef(null);
  const chatEnd=useRef(null);
  const histRef=useRef([]);

  // Login handler
  function handleLogin(tok,usr){
    setToken(tok);setUser(usr);
    localStorage.setItem('sb_token',tok);
    localStorage.setItem('sb_user',JSON.stringify(usr));
  }

  // Logout
  async function logout(){
    if(token)await sb.signOut(token);
    localStorage.removeItem('sb_token');localStorage.removeItem('sb_user');
    setToken(null);setUser(null);setProfil(null);
  }

  // Auto-refresh token on startup
  useEffect(function(){
    if(!token)return;
    // Try to refresh token proactively
    sb.refresh().then(function(newTok){
      if(newTok){setToken(newTok);console.log('Token refreshed');}
    }).catch(function(){});
    // Also set up periodic refresh every 50 minutes
    var interval=setInterval(function(){
      sb.refresh().then(function(newTok){if(newTok)setToken(newTok);}).catch(function(){});
    },50*60*1000);
    return function(){clearInterval(interval);};
  },[]);

  // Load profile - non-blocking
  useEffect(function(){
    if(!token||!user)return;
    // Set basic profile immediately so UI works
    setProfil({id:user.id,email:user.email,name:user.user_metadata&&user.user_metadata.full_name||user.email,rolle:'projektleiter'});
    // Then try to load from DB
    sb.select('profiles',token,'id=eq.'+user.id).then(function(data){
      if(data&&data[0])setProfil(data[0]);
    }).catch(function(){});
  },[token,user]);

  // Load projects
  useEffect(function(){
    if(!token)return;
    ladeProjekte();
  },[token,profil]);

  async function ladeProjekte(){
    if(!token)return;
    try{
      var data=await sb.select('projekte',token,'order=erstellt_am.desc');
      if(Array.isArray(data)){
        setProjekte(data);
        if(data.length>0&&!aktivProjekt)setAktivProjekt(data[0]);
      }
    }catch(e){console.error('Projekte laden:',e);}
  }

  // Load next Blatt-Nr when project changes
  useEffect(function(){
    if(!token||!aktivProjekt)return;
    sb.select('berichte',token,'projekt_id=eq.'+aktivProjekt.id+'&order=blatt_nr.desc&limit=1','blatt_nr').then(function(data){
      if(Array.isArray(data)&&data[0])setBlattNr(data[0].blatt_nr+1);
      else setBlattNr(1);
    }).catch(function(){setBlattNr(1);});
  },[token,aktivProjekt]);

  // Load archive
  async function ladeArchiv(){
    if(!token)return;
    setArchivLoad(true);
    try{
      // Load berichte with projekt name joined
      var data=await sb.select('berichte',token,'order=datum.desc,blatt_nr.desc',
        'id,blatt_nr,datum,status,ausgefuehrte_arbeiten,fehlende_felder,projekt_id,'+
        'ak_polier,ak_werkpolier,ak_vorarbeiter,ak_maurer,ak_zimmerer,ak_betonbauer,ak_helfer,ak_maschinenpersonal,ak_azubis,'+
        'g_raupen,g_raupen_anzahl,g_bagger,g_bagger_anzahl,g_kraene,g_kraene_anzahl,'+
        'g_kompressor,g_kompressor_anzahl,g_verd_geraete,g_verd_geraete_anzahl,'+
        'g_lkw,g_lkw_anzahl,g_betonstahl,g_betonstahl_anzahl,g_beton,g_beton_anzahl,'+
        'temp_7h,temp_12h,temp_16h,niederschlag,luftbewegung,'+
        'nachunternehmer,sonstiges,besuche_text,polier_name,bauleiter_name,bauherr_name,'+
        'projekte(name,bau_nr)');
      if(Array.isArray(data)){
        // Flatten projekt name
        var enriched=data.map(function(b){
          return {...b,projekt_name:b.projekte?b.projekte.name:'Unbekannt'};
        });
        setArchiv(enriched);
      }
    }catch(e){console.error('Archiv laden:',e);}
    setArchivLoad(false);
  }

  useEffect(function(){if(chatEnd.current)chatEnd.current.scrollIntoView({behavior:'smooth'});},[msgs]);

  // Weather
  async function fetchWx(){
    if(!aktivProjekt||!aktivProjekt.lat)return;
    setWload(true);
    try{
      var r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+aktivProjekt.lat+'&longitude='+aktivProjekt.lon+
        '&hourly=temperature_2m,weathercode,windspeed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=Europe/Berlin&forecast_days=1');
      var d=await r.json();
      var code=d.hourly.weathercode[7]||0;
      var avg=(d.hourly.windspeed_10m[7]+d.hourly.windspeed_10m[12]+d.hourly.windspeed_10m[16])/3;
      var w={
        temp7:Math.round(d.hourly.temperature_2m[7])+'°C',
        temp12:Math.round(d.hourly.temperature_2m[12])+'°C',
        temp16:Math.round(d.hourly.temperature_2m[16])+'°C',
        tempMax:Math.round(d.daily.temperature_2m_max[0])+'°C',
        tempMin:Math.round(d.daily.temperature_2m_min[0])+'°C',
        niederschlag:getN(code),luftbewegung:getW(avg)
      };
      setForm(function(f){return Object.assign({},f,w);});
      setMsgs(function(m){return m.concat([{role:'assistant',content:'Wetter geladen: '+w.temp7+' bis '+w.tempMax+', '+w.luftbewegung}]);});
    }catch(e){console.error(e);}
    setWload(false);
  }

  // Voice recording
  async function startRecording(){
    try{
      var stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRef.current=stream;
      var mr=new MediaRecorder(stream);
      var chunks=[];
      mr.ondataavailable=function(e){chunks.push(e.data);};
      mr.onstop=async function(){
        var blob=new Blob(chunks,{type:'audio/webm'});
        stream.getTracks().forEach(function(t){t.stop();});
        // Send to chat as transcription placeholder
        setMsgs(function(m){return m.concat([{role:'user',content:'[Sprachaufnahme - wird verarbeitet...]'}]);});
        // For now, prompt user to describe
        setMsgs(function(m){return m.concat([{role:'assistant',content:'Sprachaufnahme erhalten! Tippe kurz was du gesagt hast und ich fülle das Formular aus.'}]);});
      };
      mr.start();
      setRecorder(mr);setRecording(true);
    }catch(e){alert('Mikrofon nicht verfügbar: '+e.message);}
  }
  function stopRecording(){
    if(recorder){recorder.stop();setRecorder(null);}
    setRecording(false);
  }

  // Photo upload
  async function uploadPhoto(file){
    setMsgs(function(m){return m.concat([{role:'assistant',content:'Foto wird gespeichert...'}]);});
    // Store locally for now (Supabase Storage in Phase 5)
    var reader=new FileReader();
    reader.onload=function(e){
      setMsgs(function(m){return m.concat([{role:'assistant',content:'Foto gespeichert! Beschreibe was auf dem Foto zu sehen ist und ich ergaenze den Bericht.'}]);});
    };
    reader.readAsDataURL(file);
  }

  // AI Chat
  const send=useCallback(async function(){
    if(!input.trim()||aiLoad)return;
    var um=input.trim();setInput('');
    setMsgs(function(m){return m.concat([{role:'user',content:um}]);});
    histRef.current.push({role:'user',content:um});
    setAiLoad(true);
    var sys='Du bist ein Bautagebuch-Assistent fuer Riedel Bau GmbH. Projekt: '+(aktivProjekt?aktivProjekt.name:'Unbekannt')+
      '. Formular: '+JSON.stringify(form)+
      '. Antworte NUR als JSON: {"antwort":"Bestaetigung","updates":{"ausgefuehrteArbeiten":"Text","sonstiges":"opt","besucheText":"opt","nachunternehmer":"opt","arbeitskraefte":{},"besuche":{},"geraete":{}}}';
    try{
      var raw=await callClaude([{role:'user',content:sys+'\n\nNachricht: '+um}]);
      var p;try{p=JSON.parse(raw.replace(/```json|```/g,''));}catch(e){p={antwort:'Notiert!',updates:{ausgefuehrteArbeiten:(form.ausgefuehrteArbeiten?form.ausgefuehrteArbeiten+'\n':'')+um}};}
      if(p.updates){
        setForm(function(f){
          var n=Object.assign({},f),u=p.updates;
          if(u.ausgefuehrteArbeiten!=null)n.ausgefuehrteArbeiten=u.ausgefuehrteArbeiten;
          if(u.sonstiges)n.sonstiges=u.sonstiges;if(u.besucheText)n.besucheText=u.besucheText;
          if(u.nachunternehmer)n.nachunternehmer=u.nachunternehmer;
          if(u.arbeitskraefte)n.arbeitskraefte=Object.assign({},f.arbeitskraefte,u.arbeitskraefte);
          if(u.besuche)n.besuche=Object.assign({},f.besuche,u.besuche);
          if(u.geraete)n.geraete=Object.assign({},f.geraete,u.geraete);
          return n;
        });
      }
      setMsgs(function(m){return m.concat([{role:'assistant',content:p.antwort||'Verstanden!'}]);});
      histRef.current.push({role:'assistant',content:p.antwort});
    }catch(e){setMsgs(function(m){return m.concat([{role:'assistant',content:'Verbindungsfehler.'}]);});}
    setAiLoad(false);
  },[input,form,aiLoad,aktivProjekt]);

  // Export + Save to Supabase
  async function exportBericht(bestaetigen){
    if(!aktivProjekt||!token){alert('Bitte zuerst ein Projekt wählen');return;}
    setSaveStatus('saving');
    
    // Fehlende Felder prüfen
    var f=pruefeFehlend(form);
    if(f.length>0&&!bestaetigen){
      setFehlend(f);setZeigFehlend(true);setSaveStatus(null);return;
    }
    
    try{
      // Bericht in Supabase speichern
      // Bericht in Supabase speichern
      var berichtData={
        projekt_id:aktivProjekt.id,
        blatt_nr:blattNr,
        datum:form.datum?form.datum.split('.').reverse().join('-'):todayISO(),
        arbeitszeit:form.arbeitszeit,
        temp_7h:form.temp7,temp_12h:form.temp12,temp_16h:form.temp16,
        temp_max:form.tempMax,temp_min:form.tempMin,
        niederschlag:form.niederschlag,luftbewegung:form.luftbewegung,
        ak_polier:form.arbeitskraefte.polier,ak_werkpolier:form.arbeitskraefte.werkpolier,
        ak_vorarbeiter:form.arbeitskraefte.vorarbeiter,ak_maurer:form.arbeitskraefte.maurer,
        ak_zimmerer:form.arbeitskraefte.zimmerer,ak_betonbauer:form.arbeitskraefte.betonbauer,
        ak_helfer:form.arbeitskraefte.helfer,ak_maschinenpersonal:form.arbeitskraefte.maschinenpersonal,
        ak_azubis:form.arbeitskraefte.azubis,
        g_raupen:form.geraete.raupen>0,g_raupen_anzahl:form.geraete.raupen||0,g_bagger:form.geraete.bagger>0,g_bagger_anzahl:form.geraete.bagger||0,g_kraene:form.geraete.kraene>0,g_kraene_anzahl:form.geraete.kraene||0,g_kompressor:form.geraete.kompressor>0,g_kompressor_anzahl:form.geraete.kompressor||0,g_verd_geraete:form.geraete.verdGeraete>0,g_verd_geraete_anzahl:form.geraete.verdGeraete||0,g_lkw:form.geraete.lkw>0,g_lkw_anzahl:form.geraete.lkw||0,g_betonstahl:form.geraete.betonstahl>0,g_betonstahl_anzahl:form.geraete.betonstahl||0,g_beton:form.geraete.beton>0,g_beton_anzahl:form.geraete.beton||0,
        nachunternehmer:form.nachunternehmer,
        ausgefuehrte_arbeiten:form.ausgefuehrteArbeiten,
        sonstiges:form.sonstiges,besuche_text:form.besucheText,
        polier_name:form.besuche.polier,bauleiter_name:form.besuche.bauleiter,bauherr_name:form.besuche.bauherr,
        status:bestaetigen?'bestaetigt':'entwurf',
        // erstellt_von handled by DB,
        // bestaetigt_von handled by DB,
        bestaetigt_am:bestaetigen?new Date().toISOString():null,
        fehlende_felder:f
      };
      var saved=await sb.insert('berichte',token,berichtData);
      
      // PDF generieren und herunterladen
      var doc=buildPDFDoc(form,aktivProjekt.name,aktivProjekt.bau_nr||'',blattNr);
      var fn='Bautagebuch_'+aktivProjekt.name.replace(/\s+/g,'-')+'_Blatt'+String(blattNr).padStart(3,'0')+'_'+form.datum.replace(/\./g,'-')+'.pdf';
      doc.save(fn);
      
      // Naechste Blatt-Nr. laden
      setBlattNr(function(n){return n+1;});
      setSaveStatus('ok');
      setMsgs(function(m){return m.concat([{role:'assistant',content:'Bericht Blatt '+blattNr+' gespeichert'+(bestaetigen?' und bestaetigt':' als Entwurf')+'!'}]);});
      
      // Wenn bestaetigt: neues leeres Formular
      if(bestaetigen){
        setTimeout(function(){setForm(mkForm());setMsgs([]);histRef.current=[];},2000);
      }
    }catch(e){
      console.error('Export Fehler:',e);
      setSaveStatus('error');
    }
    setTimeout(function(){setSaveStatus(null);},4000);
  }

  // Projekt erstellen
  async function projektErstellen(name,bauNr,ort){
    if(!token)return;
    try{
      var payload={name:name,status:'aktiv'};
      if(bauNr)payload.bau_nr=bauNr;
      if(ort)payload.ort=ort;
      await sb.insert('projekte',token,payload);
      // Reload projects and set the new one active
      var t=await sb.select('projekte',token,'order=erstellt_am.desc');
      if(Array.isArray(t)){
        setProjekte(t);
        var neu=t.find(function(p){return p.name===name;})||t[0];
        if(neu){
          setAktivProjekt(neu);
          // Load blatt nr inline (no external function needed)
          try{
            var bl=await sb.select('berichte',token,'projekt_id=eq.'+neu.id+'&order=blatt_nr.desc&limit=1','blatt_nr');
            setBlattNr(Array.isArray(bl)&&bl[0]?bl[0].blatt_nr+1:1);
          }catch{setBlattNr(1);}
          setTab('setup');
        }
      }
    }catch(e){console.error('Projekt erstellen:',e);alert('Fehler beim Erstellen: '+e.message);}
  }

  // ── Styles ────────────────────────────────────────────────────────
  var C={

    lb:{fontSize:11,fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:3},
    inp:{width:'100%',padding:'7px 10px',border:'1.5px solid #e0ddd8',borderRadius:6,fontSize:13,background:'#fafaf9',boxSizing:'border-box'},
    ta:{width:'100%',padding:'8px 10px',border:'1.5px solid #e0ddd8',borderRadius:6,fontSize:13,background:'#fafaf9',boxSizing:'border-box',resize:'vertical'},
    btn:function(c){return{background:c||'#CC0000',color:'#fff',border:'none',borderRadius:7,padding:'9px 18px',cursor:'pointer',fontWeight:700,fontSize:13,fontFamily:'inherit'};},
  };
  var AK=[['polier','Polier'],['werkpolier','Werkpolier'],['vorarbeiter','Vorarbeiter'],['maurer','Maurer'],['zimmerer','Zimmerer'],['betonbauer','Betonbauer'],['helfer','Helfer'],['maschinenpersonal','Masch.Pers.'],['azubis','Azubis']];
  var GF=[['raupen','Raupen'],['bagger','Bagger'],['kraene','Kraene'],['kompressor','Kompressor'],['verdGeraete','Verd. Geraete'],['lkw','LKW'],['betonstahl','Betonstahl'],['beton','Beton']];
  var btnLabel=saveStatus==='saving'?'Speichert...':saveStatus==='ok'?'Gespeichert!':saveStatus==='error'?'Fehler!':'PDF + Speichern';

  if(!token||!user)return <LoginScreen onLogin={handleLogin}/>;

  return(
  <div style={{fontFamily:"'DM Sans',sans-serif",minHeight:'100vh',background:'#F5F4F2'}}>
    {/* Fehlende Felder Dialog */}
    {zeigFehlend&&<FehlendDialog
      fehlend={fehlend} form={form}
      onChange={function(k,v){
        if(k.startsWith('besuche.')){
          var field=k.split('.')[1];
          setForm(function(f){return Object.assign({},f,{besuche:Object.assign({},f.besuche,{[field]:v})});});
        } else {
          setForm(function(f){return Object.assign({},f,{[k]:v});});
        }
      }}
      onClose={function(){setZeigFehlend(false);}}
      onSave={function(){setZeigFehlend(false);exportBericht(false);}}
    />}

    {/* Header */}
    <div style={{background:'#CC0000',color:'#fff',padding:'11px 20px',display:'flex',alignItems:'center',gap:12,boxShadow:'0 2px 12px rgba(200,0,0,.3)'}}>
      <img src={LOGO_PNG} style={{width:36,height:36,objectFit:'contain',background:'#fff',borderRadius:6,padding:2}} alt="Logo"/>
      <div>
        <div style={{fontWeight:800,fontSize:16,letterSpacing:.5}}>BAUTAGEBUCH BOT</div>
        <div style={{fontSize:11,opacity:.85}}>
          {aktivProjekt?aktivProjekt.name:'Kein Projekt'} · {profil?profil.name:''} · {profil?'('+profil.rolle+')':''}
        </div>
      </div>
      <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
        {aktivProjekt&&<div style={{fontSize:11,background:'rgba(255,255,255,.2)',borderRadius:5,padding:'3px 8px'}}>
          Blatt {blattNr}
        </div>}
        <button onClick={function(){exportBericht(false);}} disabled={saveStatus==='saving'}
          style={{...C.btn('#fff'),color:'#CC0000',fontSize:12,padding:'6px 12px',opacity:saveStatus==='saving'?.6:1}}>
          {btnLabel}
        </button>
        <button onClick={function(){exportBericht(true);}} disabled={saveStatus==='saving'}
          style={{...C.btn('#2E7D32'),fontSize:12,padding:'6px 12px',opacity:saveStatus==='saving'?.6:1}}>

    <div>
      {/* Aktuelles Projekt konfigurieren */}
      {aktivProjekt&&<div style={{...C.card,background:'#FFF8F0',border:'1px solid #f0ddb0',padding:'12px 16px',marginBottom:10}}>
        <span style={{fontSize:13,color:'#8B6914',fontWeight:700}}>Einstellungen für: {aktivProjekt.name}</span>
      </div>}
      {aktivProjekt&&<ProjektEinstellungen projekt={aktivProjekt} token={token} onUpdate={function(updated){
        setAktivProjekt(updated);
        ladeProjekte();
      }}/>}
      {/* Profil */}
      <div style={C.card}><div style={C.sh}>Mein Profil</div>
        <div style={{fontSize:13,color:'#555',lineHeight:2}}>
          <div>Name: <strong>{profil?profil.name:''}</strong></div>
          <div>E-Mail: <strong>{user?user.email:''}</strong></div>
          <div>Rolle: <strong style={{color:'#CC0000'}}>{profil?profil.rolle:'wird zugewiesen'}</strong></div>
        </div>
      </div>
      {/* Neues Projekt */}
      <div style={C.card}><div style={C.sh}>Neues Projekt anlegen</div>
        <NeuProjekt onSave={projektErstellen}/>
      </div>
      {/* Alle Projekte */}
      <div style={C.card}><div style={C.sh}>Projekte</div>
        {projekte.length===0&&<div style={{fontSize:13,color:'#888'}}>Noch keine Projekte. Oben anlegen.</div>}
        {projekte.map(function(p){return(
          <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid #f0efed'}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
              <div style={{fontSize:11,color:'#888'}}>{p.bau_nr||'Keine Bau-Nr.'} · {p.status}</div>
            </div>
            <button onClick={function(){setAktivProjekt(p);setTab('chat');}}
              style={{...C.btn(aktivProjekt&&aktivProjekt.id===p.id?'#CC0000':'#888'),fontSize:11,padding:'4px 10px'}}>
              {aktivProjekt&&aktivProjekt.id===p.id?'Aktiv':'Wechseln'}
            </button>
          </div>
        );})}
      </div>
      <div style={{...C.card,background:'#F0F8FF',border:'1px solid #c0d8f0'}}><div style={C.sh}>Desktop-Verknuepfung</div>
        <ol style={{fontSize:13,color:'#555',lineHeight:2.2,paddingLeft:20}}>
          <li>Diese Seite in Chrome oder Safari oeffnen</li>
          <li>Chrome: Menue → Weitere Tools → Verknuepfung erstellen</li>
          <li>Safari (iPhone): Teilen → Zum Home-Bildschirm</li>
        </ol>
      </div>
    </div>
    )}
    </div>
  </div>);
}

// Neues Projekt Formular
function NeuProjekt({onSave}){
  var [name,setName]=useState('');
  var [bauNr,setBauNr]=useState('');
  var [ort,setOrt]=useState('');
  var [geo,setGeo]=useState([]);
  var [lat,setLat]=useState(null);
  var [lon,setLon]=useState(null);
  var [saving,setSaving]=useState(false);

  function searchGeo(q){
    if(!q||q.length<2){setGeo([]);return;}
    fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=5&language=de')
      .then(function(r){return r.json();}).then(function(d){setGeo(d.results||[]);}).catch(function(){});
  }

  async function save(){
    if(!name){alert('Bitte Projektname eingeben');return;}
    if(!name.trim()){alert('Bitte Projektname eingeben');return;}
    setSaving(true);
    await onSave(name.trim(),bauNr,ort,lat,lon);
    setName('');setBauNr('');setOrt('');setLat(null);setLon(null);
    setSaving(false);
  }

  var C2={inp:{width:'100%',padding:'7px 10px',border:'1.5px solid #e0ddd8',borderRadius:6,fontSize:13,background:'#fafaf9',boxSizing:'border-box',marginBottom:8}};
  return(
  <div>
    <input style={C2.inp} placeholder="Projektname / BVH *" value={name} onChange={function(e){setName(e.target.value);}}/>
    <input style={C2.inp} placeholder="Bau-Nr." value={bauNr} onChange={function(e){setBauNr(e.target.value);}}/>
    <input style={C2.inp} placeholder="Ort (fuer Wetter)" value={ort}
      onChange={function(e){setOrt(e.target.value);searchGeo(e.target.value);}}/>
    {geo.length>0&&(
      <div style={{background:'#fff',border:'1px solid #e0ddd8',borderRadius:6,marginBottom:8,overflow:'hidden'}}>
        {geo.map(function(r){return(
          <div key={r.id} onClick={function(){setOrt(r.name+(r.admin1?', '+r.admin1:''));setLat(r.latitude);setLon(r.longitude);setGeo([]);}}
            style={{padding:'8px 12px',cursor:'pointer',fontSize:13,borderBottom:'1px solid #f0efed'}}>
            {r.name}{r.admin1?', '+r.admin1:''}{r.country?', '+r.country:''}
          </div>
        );})}
      </div>
    )}
    <button onClick={save} disabled={saving} style={{width:'100%',padding:10,background:'#2E7D32',color:'#fff',border:'none',borderRadius:7,cursor:'pointer',fontWeight:700,fontSize:13,fontFamily:'inherit',opacity:saving?.7:1}}>
      {saving?'Erstelle...':'+ Projekt erstellen'}
    </button>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
