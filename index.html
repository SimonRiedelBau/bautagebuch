async function sbUpdateBericht(token, id, data) {
  var r = await fetch(SB_URL + '/rest/v1/berichte?id=eq.' + id, {
    method: 'PATCH',
    headers: {
      ...sb._h(token),
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(data)
  });

  return Array.isArray(d) ? d[0] : d;
}

const sb = {
  _h: token => ({
    'Content-Type': 'application/json',
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + (token || localStorage.getItem('sb_token') || SB_KEY)
  }),
  async signIn(email, pw) {
    const r = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: sb._h(null),
      body: JSON.stringify({
        email,
        password: pw
      })
    });
    const d = await r.json();
    // Store refresh token
    if (d.refresh_token) localStorage.setItem('sb_refresh', d.refresh_token);
    return d;
  },
  async refresh() {
    const rt = localStorage.getItem('sb_refresh');
    if (!rt) return null;
    try {
      const r = await fetch(SB_URL + '/auth/v1/token?grant_type=refresh_token', {
        method: 'POST',
        headers: sb._h(null),
        body: JSON.stringify({
          refresh_token: rt
        })
      });
      const d = await r.json();
      if (d.access_token) {
        localStorage.setItem('sb_token', d.access_token);
        if (d.refresh_token) localStorage.setItem('sb_refresh', d.refresh_token);
        return d.access_token;
      }
    } catch (e) {
      console.error('Refresh failed:', e);
    }
    return null;
  },
  async safeRequest(fn) {
    // Always read freshest token from localStorage
    const tok = localStorage.getItem('sb_token') || '';
    try {
      return await fn(tok);
    } catch (e) {
      if (e.message && (e.message.includes('JWT') || e.message.includes('expired') || e.message.includes('token') || e.message.includes('Invalid'))) {
        console.log('Token expired, auto-refreshing...');
        const newTok = await sb.refresh();
        if (newTok) {
          return await fn(newTok);
        } else {
          throw new Error('Sitzung abgelaufen. Bitte neu anmelden.');
        }
      }
      throw e;
    }
  },
  async signUp(email, pw, name) {

  async update(table, token, data, filter) {
    const doReq = async tok => {

    for (var i = 0; i < words.length; i++) {
      var t = cur ? cur + ' ' + words[i] : words[i];
      if (t.length <= max) cur = t;else {
        if (cur) result.push(cur);
        cur = words[i];
      }
    }
    if (cur) result.push(cur);
  }
  return result;
}

// ── Lokaler NLP Parser (Fallback ohne API) ───────────────────────
function parseLokal(text, form) {
  var t = text.toLowerCase();
  var updates = {};
  var antwort = '';
  // Zahlen für Arbeitskräfte
  var akMap = {
    'polier': ['polier', 'poliere'],
    'maurer': ['maurer', 'mauerer'],
    'zimmerer': ['zimmerer'],
    'betonbauer': ['betonbauer', 'beton'],
    'helfer': ['helfer'],
    'vorarbeiter': ['vorarbeiter'],
    'werkpolier': ['werkpolier'],
    'maschinenpersonal': ['maschinist', 'maschinenpersonal', 'baggerfahrer', 'kranfahrer'],
    'azubis': ['azubi', 'lehrling', 'auszubildend']
  };
  // Arbeitskräfte erkennen
  var akUpdates = {};
  Object.entries(akMap).forEach(function (e) {
    var key = e[0],
      aliases = e[1];
    aliases.forEach(function (alias) {
      var match = text.match(new RegExp('(\\d+)\\s*' + alias, 'i')) || text.match(new RegExp(alias + '[:\\s]+(\\d+)', 'i'));
      if (match) {
        akUpdates[key] = parseInt(match[1] || match[2]);
        antwort = 'Arbeitskräfte aktualisiert!';
      }
    });
  });
  if (Object.keys(akUpdates).length > 0) updates.arbeitskraefte = akUpdates;
  // Geräte erkennen
  var geraeteMap = {
    'bagger': ['bagger'],
    'kraene': ['kran', 'kräne', 'kraene'],
    'raupen': ['raupe', 'radlader'],
    'kompressor': ['kompressor'],
    'verdGeraete': ['rüttel', 'verdicht'],
    'lkw': ['lkw', 'lastwagen'],
    'betonstahl': ['betonstahl'],
    'beton': ['betonpumpe', 'betonmischer']
  };
  var gUpdates = {};
  Object.entries(geraeteMap).forEach(function (e) {
    var key = e[0],
      aliases = e[1];
    aliases.forEach(function (alias) {
      if (t.includes(alias)) {
        var m = text.match(new RegExp('(\\d+)\\s*' + alias, 'i'));
        gUpdates[key] = m ? parseInt(m[1]) : 1;
      }
    });
  });
  if (Object.keys(gUpdates).length > 0) updates.geraete = gUpdates;
  // Wetter erkennen
  if (t.match(/\d+\s*(grad|°c|°)/)) {
    var temps = text.match(/(\d+)\s*(grad|°[cC]?)/g);
    if (temps && temps.length >= 1) updates.temp7 = temps[0].replace(/grad/i, '').trim() + '°C';
    if (temps && temps.length >= 2) updates.tempMax = temps[1].replace(/grad/i, '').trim() + '°C';
  }
  if (t.includes('regen')) updates.niederschlag = 'Regenschauer';
  if (t.includes('schnee')) updates.niederschlag = 'Schneefall';
  if (t.includes('windstill') || t.includes('still')) updates.luftbewegung = 'still';
  if (t.includes('wind')) updates.luftbewegung = 'mäßiger Wind';

        // Historische Wetterdaten (ERA5 Reanalysis)
        url = 'https://archive-api.open-meteo.com/v1/archive?latitude=' + aktivProjekt.lat
          + '&longitude=' + aktivProjekt.lon

          + '&daily=temperature_2m_max,temperature_2m_min'
          + '&timezone=Europe/Berlin';
      } else {
        // Vorhersage (heute oder Zukunft)
        var daysAhead = istZukunft ? Math.min(16, Math.ceil((new Date(isoDate) - new Date(heute)) / 86400000) + 1) : 1;
        url = 'https://api.open-meteo.com/v1/forecast?latitude=' + aktivProjekt.lat
          + '&longitude=' + aktivProjekt.lon
          + '&hourly=temperature_2m,weathercode,windspeed_10m'
          + '&daily=temperature_2m_max,temperature_2m_min'
          + '&timezone=Europe/Berlin&forecast_days=' + daysAhead;

      var r = await fetch(url);
      var d = await r.json();

      // Stunden-Index berechnen: welche Stunden gehören zum gesuchten Datum?
      var times = d.hourly.time || [];
      var h7 = -1, h12 = -1, h16 = -1;
      for (var ti = 0; ti < times.length; ti++) {
        if (times[ti].startsWith(isoDate + 'T07')) h7 = ti;
        if (times[ti].startsWith(isoDate + 'T12')) h12 = ti;
        if (times[ti].startsWith(isoDate + 'T16')) h16 = ti;

      if (h12 < 0) h12 = 12;
