// ── Supabase helpers ──────────────────────────────────────────────
async function sbUpdateBericht(token,id,data){
  var r=await fetch(SB_URL+'/rest/v1/berichte?id=eq.'+id,{method:'PATCH',headers:{...sb._h(token),'Prefer':'return=representation'},body:JSON.stringify(data)});
  var d=await r.json();if(d&&d.message)throw new Error(d.message);return Array.isArray(d)?d[0]:d;
}
async function sbDeleteBericht(token,id){
  var r=await fetch(SB_URL+'/rest/v1/berichte?id=eq.'+id,{method:'DELETE',headers:sb._h(token)});
  if(!r.ok)throw new Error('Loeschen fehlgeschlagen');return true;
}

const sb={
  _h:(token)=>({'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(token||localStorage.getItem('mob_token')||SB_KEY)}),
  async signIn(email,pw){const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:sb._h(null),body:JSON.stringify({email,password:pw})});return r.json();},
  async signUp(email,pw,name){const r=await fetch(SB_URL+'/auth/v1/signup',{method:'POST',headers:sb._h(null),body:JSON.stringify({email,password:pw,data:{full_name:name}})});return r.json();},
  async signOut(token){await fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:sb._h(token)});},
  async select(table,token,filter,cols){
    if(!cols)cols='*';if(!filter)filter='';
    const url=SB_URL+'/rest/v1/'+table+'?select='+cols+(filter?'&'+filter:'');
    const r=await fetch(url,{headers:{...sb._h(token),'Prefer':'return=representation'}});
    const d=await r.json();if(d&&d.message)throw new Error(d.message);
    return Array.isArray(d)?d:[];
  },
  async insert(table,token,data){
    const r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{...sb._h(token),'Prefer':'return=representation'},body:JSON.stringify(data)});
    const d=await r.json();if(d&&d.message)throw new Error(d.message);
    return Array.isArray(d)?d[0]:d;
  },
  async update(table,token,data,filter){
    const r=await fetch(SB_URL+'/rest/v1/'+table+'?'+filter,{method:'PATCH',headers:{...sb._h(token),'Prefer':'return=representation'},body:JSON.stringify(data)});
    const d=await r.json();if(d&&d.message)throw new Error(d.message);
    return Array.isArray(d)?d[0]:d;
  },
  async refresh(){
    const rt=localStorage.getItem('mob_refresh');
    if(!rt)return null;
    try{
      const r=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{
        method:'POST',headers:sb._h(null),body:JSON.stringify({refresh_token:rt})
      });
      const d=await r.json();
      if(d.access_token){
        localStorage.setItem('mob_token',d.access_token);
        if(d.refresh_token)localStorage.setItem('mob_refresh',d.refresh_token);
        return d.access_token;
      }
    }catch(e){}
    return null;
  },
  async safeRequest(fn){
    const tok=localStorage.getItem('mob_token')||'';
    try{return await fn(tok);}
    catch(e){
      if(e.message&&(e.message.includes('JWT')||e.message.includes('expired')||e.message.includes('token'))){
        const newTok=await sb.refresh();
        if(newTok)return await fn(newTok);
        throw new Error('Sitzung abgelaufen. Bitte neu anmelden.');
      }
      throw e;
    }
  },
  async remove(table,token,filter){
    const doReq=async(tok)=>{
      const r=await fetch(SB_URL+'/rest/v1/'+table+'?'+filter,{method:'DELETE',headers:sb._h(tok||token)});
      if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.message||'Fehler '+r.status);}
      return true;
    };
    return sb.safeRequest(doReq);
  }
};

// ── Lokaler NLP Parser ───────────────────────────────────────────
function parseLokal(text, form){
  var t=text.toLowerCase();
  var updates={};
  var antwort='';
  var akMap={polier:['polier'],maurer:['maurer'],zimmerer:['zimmerer'],betonbauer:['betonbauer','beton'],helfer:['helfer'],vorarbeiter:['vorarbeiter'],werkpolier:['werkpolier'],maschinenpersonal:['maschinist','baggerfahrer'],azubis:['azubi','lehrling']};
  var akUpdates={};
  Object.entries(akMap).forEach(function(e){var key=e[0],aliases=e[1];aliases.forEach(function(alias){var match=text.match(new RegExp('(\\d+)\\s*'+alias,'i'))||text.match(new RegExp(alias+'[:\\s]+(\\d+)','i'));if(match){akUpdates[key]=parseInt(match[1]||match[2]);antwort='Arbeitskräfte aktualisiert!';}});});
  if(Object.keys(akUpdates).length>0)updates.arbeitskraefte=akUpdates;
  var geraeteMap={bagger:['bagger'],kraene:['kran'],raupen:['raupe'],kompressor:['kompressor'],verdGeraete:['rüttel','verdicht'],lkw:['lkw'],betonstahl:['betonstahl'],beton:['betonpumpe']};
  var gUpdates={};
  Object.entries(geraeteMap).forEach(function(e){var key=e[0],aliases=e[1];aliases.forEach(function(alias){if(t.includes(alias)){var m=text.match(new RegExp('(\\d+)\\s*'+alias,'i'));gUpdates[key]=m?parseInt(m[1]):1;}});});
  if(Object.keys(gUpdates).length>0)updates.geraete=gUpdates;
  if(t.includes('regen'))updates.niederschlag='Regenschauer';
  if(t.includes('schnee'))updates.niederschlag='Schneefall';
  if(t.includes('windstill')||t.includes('still'))updates.luftbewegung='still';
  if(t.includes('wind'))updates.luftbewegung='mäßiger Wind';
  if(t.includes('sturm'))updates.luftbewegung='starker Wind';
  if(!antwort||(Object.keys(updates).length===0)){
    var neu=(form.ausgefuehrteArbeiten?form.ausgefuehrteArbeiten+'\n':'')+text;
    updates.ausgefuehrteArbeiten=neu;
    if(!antwort)antwort='Notiert in Ausgeführte Arbeiten!';
  }
  return {antwort:antwort||'Verstanden!',updates:updates};
}

async function callClaude(msgs){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:msgs})});
    const d=await r.json();
    if(d&&d.error)return null;
    return d.content&&d.content[0]?d.content[0].text:null;
  }catch(e){return null;}
}

    if(!email||!pw){setErr('E-Mail und Passwort eingeben');return;}

    try{
      var res=mode==='login'?await sb.signIn(email,pw):await sb.signUp(email,pw,name);
      if(res.error||res.message){setErr(res.error_description||res.message||'Fehler');}
      else if(res.access_token){localStorage.setItem('sb_token',res.access_token);localStorage.setItem('sb_user',JSON.stringify(res.user));onLogin(res.access_token,res.user);}
      else setErr('Bitte E-Mail bestätigen');
    }catch(e){setErr('Verbindungsfehler');}
    setLoading(false);
  }

    <div style={{background:'#fff',borderRadius:20,padding:24,width:'100%',maxWidth:380,boxShadow:'0 20px 60px rgba(0,0,0,.3)'}}>

        {[['login','Anmelden'],['signup','Registrieren']].map(function(t){return(
          <button key={t[0]} onClick={function(){setMode(t[0]);setErr('');}}
            style={{flex:1,padding:'9px',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14,fontFamily:'inherit',
              background:mode===t[0]?'#CC0000':'transparent',color:mode===t[0]?'#fff':'#888',transition:'all .2s'}}>
            {t[1]}
          </button>
        );})}
      </div>
      {err&&<div style={{background:'#fff0f0',border:'1px solid #ffcccc',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#CC0000',marginBottom:12}}>{err}</div>}
      {mode==='signup'&&<input style={{width:'100%',padding:'13px 16px',border:'1.5px solid #e0ddd8',borderRadius:10,fontSize:15,fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}} placeholder="Vollständiger Name" value={name} onChange={e=>setName(e.target.value)}/>}
      <input style={{width:'100%',padding:'13px 16px',border:'1.5px solid #e0ddd8',borderRadius:10,fontSize:15,fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}} placeholder="E-Mail" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
      <input style={{width:'100%',padding:'13px 16px',border:'1.5px solid #e0ddd8',borderRadius:10,fontSize:15,fontFamily:'inherit',boxSizing:'border-box',marginBottom:16}} placeholder="Passwort" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
      <button onClick={submit} disabled={loading} style={{width:'100%',padding:15,background:'#CC0000',color:'#fff',border:'none',borderRadius:10,fontSize:16,fontWeight:700,cursor:'pointer',fontFamily:'inherit',opacity:loading?.7:1}}>
        {loading?'Laden...':(mode==='login'?'Anmelden':'Registrieren')}
      </button>
    </div>
  </div>);
}

// ── Main Mobile App ───────────────────────────────────────────────
function App(){
  const [token,setToken]=useState(()=>localStorage.getItem('sb_token')||null);

  const [tab,setTab]=useState('home');
  const [projekte,setProjekte]=useState([]);
  const [aktivProjekt,setAktivProjekt]=useState(null);
  const [form,setForm]=useState(mkForm());
  const [blattNr,setBlattNr]=useState(1);
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState('');
  const [aiLoad,setAiLoad]=useState(false);
  const [wload,setWload]=useState(false);
  const [saveStatus,setSaveStatus]=useState(null);
  const [recording,setRecording]=useState(false);
  const [pdfVorschau,setPdfVorschau]=useState(null);
  const [recorder,setRecorder]=useState(null);
  const [fehlend,setFehlend]=useState([]);
  const [berichtEditId,setBerichtEditId]=useState(null);
  const chatEnd=useRef(null);
  const histRef=useRef([]);

  function handleLogin(tok,usr){setToken(tok);setUser(usr);localStorage.setItem('sb_token',tok);localStorage.setItem('sb_user',JSON.stringify(usr));}
  async function logout(){if(token)await sb.signOut(token);localStorage.clear();setToken(null);setUser(null);}

  useEffect(function(){if(token)ladeProjekte();},[token]);

  async function ladeProjekte(){

    }catch(e){
      try{var d2=await sb.select('projekte',token,'order=erstellt_am.desc');
        if(Array.isArray(d2)){setProjekte(d2);if(d2.length>0&&!aktivProjekt)setAktivProjekt(d2[0]);}
      }catch(e2){console.error(e2);}
    }
  }
  async function ladeBlattNr(pid){
    try{var d=await sb.select('berichte',token,'projekt_id=eq.'+pid+'&order=blatt_nr.desc&limit=1','blatt_nr');setBlattNr(Array.isArray(d)&&d[0]?d[0].blatt_nr+1:1);}catch(e){setBlattNr(1);}
  }

  async function fetchWetter(){
    if(!aktivProjekt||!aktivProjekt.lat)return;
    setWload(true);
    try{
      // Datum aus Formular lesen (DD.MM.YYYY)
      var datumRaw=form.datum||'';
      var isoDate;
      if(datumRaw&&datumRaw.match(/^\d{2}\.\d{2}\.\d{4}$/)){
        var p=datumRaw.split('.');
        isoDate=p[2]+'-'+p[1]+'-'+p[0];
      } else {
        isoDate=new Date().toISOString().split('T')[0];
      }
      var heute=new Date().toISOString().split('T')[0];
      var istVergangenheit=isoDate<heute;
      var istZukunft=isoDate>heute;
      var url;
      if(istVergangenheit){
        url='https://archive-api.open-meteo.com/v1/archive?latitude='+aktivProjekt.lat
          +'&longitude='+aktivProjekt.lon
          +'&start_date='+isoDate+'&end_date='+isoDate
          +'&hourly=temperature_2m,weathercode,windspeed_10m'
          +'&daily=temperature_2m_max,temperature_2m_min'
          +'&timezone=Europe/Berlin';
      } else {
        var daysAhead=istZukunft?Math.min(16,Math.ceil((new Date(isoDate)-new Date(heute))/86400000)+1):1;
        url='https://api.open-meteo.com/v1/forecast?latitude='+aktivProjekt.lat
          +'&longitude='+aktivProjekt.lon
          +'&hourly=temperature_2m,weathercode,windspeed_10m'
          +'&daily=temperature_2m_max,temperature_2m_min'
          +'&timezone=Europe/Berlin&forecast_days='+daysAhead;
      }
      var r=await fetch(url);
      var d=await r.json();
      // Stunden-Index für das gesuchte Datum
      var times=d.hourly.time||[];
      var h7=-1,h12=-1,h16=-1;
      for(var ti=0;ti<times.length;ti++){
        if(times[ti].startsWith(isoDate+'T07'))h7=ti;
        if(times[ti].startsWith(isoDate+'T12'))h12=ti;
        if(times[ti].startsWith(isoDate+'T16'))h16=ti;
      }
      if(h7<0)h7=7; if(h12<0)h12=12; if(h16<0)h16=16;
      // Tages-Index
      var dailyDates=d.daily?d.daily.time||[]:[];
      var dayIdx=dailyDates.indexOf(isoDate);
      if(dayIdx<0)dayIdx=0;
      var code=(d.hourly.weathercode&&d.hourly.weathercode[h12])||0;
      var ws7=(d.hourly.windspeed_10m&&d.hourly.windspeed_10m[h7])||0;
      var ws12=(d.hourly.windspeed_10m&&d.hourly.windspeed_10m[h12])||0;
      var ws16=(d.hourly.windspeed_10m&&d.hourly.windspeed_10m[h16])||0;
      var avg=(ws7+ws12+ws16)/3;
      var w={
        temp7:Math.round((d.hourly.temperature_2m&&d.hourly.temperature_2m[h7])||0)+'°C',
        temp12:Math.round((d.hourly.temperature_2m&&d.hourly.temperature_2m[h12])||0)+'°C',
        temp16:Math.round((d.hourly.temperature_2m&&d.hourly.temperature_2m[h16])||0)+'°C',
        tempMax:Math.round((d.daily&&d.daily.temperature_2m_max&&d.daily.temperature_2m_max[dayIdx])||0)+'°C',
        tempMin:Math.round((d.daily&&d.daily.temperature_2m_min&&d.daily.temperature_2m_min[dayIdx])||0)+'°C',
        niederschlag:getN(code),
        luftbewegung:getW(avg),
        wBeschreibung:WMO[code]||'Unbekannt'
      };
      setForm(f=>({...f,...w}));
      var typ=istVergangenheit?' (historisch)':istZukunft?' (Vorhersage)':' (heute)';
      setMsgs(m=>[...m,{role:'assistant',content:'Wetter für '+datumRaw+': '+w.temp7+' / '+w.temp12+' / '+w.temp16+' — max '+w.tempMax+', min '+w.tempMin+' — '+(w.niederschlag||'kein Niederschlag')+', '+w.luftbewegung+typ}]);
    }catch(e){
      setMsgs(m=>[...m,{role:'assistant',content:'Wetter konnte nicht geladen werden: '+e.message}]);
    }
    setWload(false);
  }

  const send=useCallback(async function(){
    if(!input.trim()||aiLoad)return;
    var um=input.trim();setInput('');
    setMsgs(m=>[...m,{role:'user',content:um}]);
    histRef.current.push({role:'user',content:um});
    setAiLoad(true);
    var sys='Bautagebuch-Assistent Riedel Bau. Projekt: '+(aktivProjekt?aktivProjekt.name:'')+'. Formular: '+JSON.stringify(form)+'. Antworte NUR als JSON: {"antwort":"Bestätigung","updates":{"ausgefuehrteArbeiten":"Text","sonstiges":"opt","besucheText":"opt","nachunternehmer":"opt","arbeitskraefte":{},"besuche":{},"geraete":{}}}';
    try{
      var raw=await callClaude([{role:'user',content:sys+'\n\nNachricht: '+um}]);
      var p;
      if(raw===null){
        p=parseLokal(um,form);
      } else {
        try{p=JSON.parse(raw.replace(/```json|```/g,''));}
        catch{p=parseLokal(um,form);}
      }
      if(p.updates){
        setForm(f=>{
          var n={...f},u=p.updates;
          if(u.ausgefuehrteArbeiten!=null)n.ausgefuehrteArbeiten=u.ausgefuehrteArbeiten;
          if(u.sonstiges)n.sonstiges=u.sonstiges;
          if(u.arbeitskraefte)n.arbeitskraefte={...f.arbeitskraefte,...u.arbeitskraefte};
          if(u.geraete)n.geraete={...f.geraete,...u.geraete};
          if(u.niederschlag)n.niederschlag=u.niederschlag;
          if(u.luftbewegung)n.luftbewegung=u.luftbewegung;
          return n;
        });
      }
      setMsgs(m=>[...m,{role:'assistant',content:p.antwort||'Verstanden!'}]);
    }catch(e){
      setForm(f=>({...f,ausgefuehrteArbeiten:(f.ausgefuehrteArbeiten?f.ausgefuehrteArbeiten+'\n':'')+um}));
      setMsgs(m=>[...m,{role:'assistant',content:'Notiert in Ausgeführte Arbeiten!'}]);
    }
    setAiLoad(false);
  },[input,form,aiLoad,aktivProjekt]);

  async   function startRec(){
    // Web Speech API (automatische Transkription auf Deutsch)
    if('SpeechRecognition' in window||'webkitSpeechRecognition' in window){
      var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      var rec=new SR();
      rec.lang='de-DE';rec.continuous=false;rec.interimResults=false;
      rec.onstart=function(){setRecording(true);setMsgs(m=>[...m,{role:'assistant',content:'Höre zu... Sprich jetzt!'}]);};
      rec.onresult=function(e){
        var transkription=e.results[0][0].transcript;
        var zt=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
        setMsgs(m=>[...m,{role:'user',content:transkription}]);
        var parsed=parseLokal(transkription,form);
        setForm(f=>{
          var n={...f,...(parsed.updates||{})};
          if(parsed.updates&&parsed.updates.arbeitskraefte)n.arbeitskraefte={...f.arbeitskraefte,...parsed.updates.arbeitskraefte};
          if(parsed.updates&&parsed.updates.geraete)n.geraete={...f.geraete,...parsed.updates.geraete};
          n.medien=[...(f.medien||[]),{typ:'sprache',dataUrl:null,beschreibung:'Aufnahme '+zt,transkription:transkription}];
          return n;
        });
        setMsgs(m=>[...m,{role:'assistant',content:parsed.antwort+' · Transkription im Anhang gespeichert.'}]);
        setRecording(false);
      };
      rec.onerror=function(e){setRecording(false);if(e.error==='not-allowed')alert('Mikrofon-Zugriff erlauben!');else setMsgs(m=>[...m,{role:'assistant',content:'Spracherkennung: '+e.error+'. Bitte tippen.'}]);};
      rec.onend=function(){setRecording(false);};
      rec.start();setRecorder(rec);return;
    }
    // Fallback: manuelle Aufnahme
    try{var stream=await navigator.mediaDevices.getUserMedia({audio:true});var mr=new MediaRecorder(stream);var chunks=[];
      mr.ondataavailable=e=>chunks.push(e.data);
      mr.onstop=async function(){stream.getTracks().forEach(t=>t.stop());var zt=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
        setForm(f=>({...f,medien:[...(f.medien||[]),{typ:'sprache',dataUrl:null,beschreibung:'Aufnahme '+zt,transkription:''}]}));
        setMsgs(m=>[...m,{role:'assistant',content:'Aufnahme gespeichert ('+zt+'). Tippe was du gesagt hast:'}]);};
      mr.start();setRecorder(mr);setRecording(true);}catch(e){alert('Mikrofon: '+e.message);}
  }
  function stopRec(){if(recorder){if(recorder.stop)recorder.stop();setRecorder(null);}setRecording(false);}

  async function exportBericht(bestaetigen){
    if(!aktivProjekt||!token){alert('Kein Projekt gewählt');return;}
    var f=pruefeFehlend(form);
    if(f.length>0&&!bestaetigen){setFehlend(f);alert('Fehlende Felder: '+f.join(', '));return;}
    setSaveStatus('saving');
    try{
      var berichtData={projekt_id:aktivProjekt.id,blatt_nr:blattNr,datum:form.datum?form.datum.split('.').reverse().join('-'):new Date().toISOString().split('T')[0],arbeitszeit:form.arbeitszeit,temp_7h:form.temp7,temp_12h:form.temp12,temp_16h:form.temp16,temp_max:form.tempMax,temp_min:form.tempMin,niederschlag:form.niederschlag,luftbewegung:form.luftbewegung,ak_polier:form.arbeitskraefte.polier,ak_werkpolier:form.arbeitskraefte.werkpolier,ak_vorarbeiter:form.arbeitskraefte.vorarbeiter,ak_maurer:form.arbeitskraefte.maurer,ak_zimmerer:form.arbeitskraefte.zimmerer,ak_betonbauer:form.arbeitskraefte.betonbauer,ak_helfer:form.arbeitskraefte.helfer,ak_maschinenpersonal:form.arbeitskraefte.maschinenpersonal,ak_azubis:form.arbeitskraefte.azubis,g_raupen:parseInt(form.geraete.raupen)||0,g_bagger:parseInt(form.geraete.bagger)||0,g_kraene:parseInt(form.geraete.kraene)||0,g_kompressor:parseInt(form.geraete.kompressor)||0,g_verd_geraete:parseInt(form.geraete.verdGeraete)||0,g_lkw:parseInt(form.geraete.lkw)||0,g_betonstahl:parseInt(form.geraete.betonstahl)||0,g_beton:parseInt(form.geraete.beton)||0,nachunternehmer:form.nachunternehmer,ausgefuehrte_arbeiten:form.ausgefuehrteArbeiten,sonstiges:form.sonstiges,besuche_text:form.besucheText,polier_name:form.besuche.polier,bauleiter_name:form.besuche.bauleiter,bauherr_name:form.besuche.bauherr,status:bestaetigen?'bestaetigt':'entwurf',fehlende_felder:f,
        anhang_text:form.anhangText||'',
        medien_json:form.medien&&form.medien.length>0?JSON.stringify(form.medien.map(function(m){return{typ:m.typ,beschreibung:m.beschreibung||'',transkription:m.transkription||''};})):null
      };
      if(berichtEditId){
        await sbUpdateBericht(token,berichtEditId,berichtData);
        setBerichtEditId(null);
      } else {
        await sb.insert('berichte',token,berichtData);
      };
      setBlattNr(n=>n+1);
      setSaveStatus('ok');
      setMsgs(m=>[...m,{role:'assistant',content:'Blatt '+blattNr+(bestaetigen?' bestätigt':'als Entwurf')+' gespeichert!'}]);
      if(bestaetigen){setTimeout(function(){setForm(mkForm());setMsgs([]);histRef.current=[];},1500);}
    }catch(e){setSaveStatus('error');console.error(e);}
    setTimeout(()=>setSaveStatus(null),3000);
  }

  if(!token||!user)return <LoginScreen onLogin={handleLogin}/>;

  // ── Home Tab ─────────────────────────────────────────────────────

      <div style={{background:'linear-gradient(135deg,#CC0000,#8B0000)',borderRadius:16,padding:'20px',marginBottom:16,color:'#fff',boxShadow:'0 4px 20px rgba(204,0,0,.3)'}}>
        <div style={{fontSize:12,opacity:.7,marginBottom:4,fontWeight:600,textTransform:'uppercase',letterSpacing:.5}}>Aktives Projekt</div>
        <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>{aktivProjekt?aktivProjekt.name:'Kein Projekt'}</div>

          <div style={{fontWeight:700,fontSize:15,color:'#1a1a1a'}}>Chat</div>
          <div style={{fontSize:12,color:'#888',marginTop:2}}>Einträge diktieren</div>
        </button>

          <div style={{fontWeight:700,fontSize:15,color:'#1a1a1a'}}>Formular</div>

  function ArchivTab(){
    var [archiv,setArchiv]=useState([]);
    var [loading,setLoading]=useState(true);
    var [filterProjekt,setFilterProjekt]=useState('alle');
    var [filterJahr,setFilterJahr]=useState('alle');
    var [filterView,setFilterView]=useState('kw');
    var [filterKW,setFilterKW]=useState('alle');
    var [filterMonat,setFilterMonat]=useState('alle');

    var MONATE=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

    useEffect(function(){
      if(!token)return;
      setLoading(true);
      sb.select('berichte',token,'order=datum.desc,blatt_nr.desc').then(function(d){
        if(Array.isArray(d))setArchiv(d);
        setLoading(false);
      }).catch(function(){setLoading(false);});
    },[token]);

    // Berechne Meta-Daten
    var archivMeta=archiv.map(function(b){
      var d=b.datum?new Date(b.datum):new Date();
      var kw=Math.ceil(((d-new Date(d.getFullYear(),0,1))/86400000+new Date(d.getFullYear(),0,1).getDay()+1)/7);
      return {...b,_jahr:String(d.getFullYear()),_kw:'KW'+String(kw).padStart(2,'0'),_monat:MONATE[d.getMonth()]};
    });

    var projekte=['alle',...new Set(archivMeta.map(function(b){return aktivProjekt?aktivProjekt.name:'';}))].filter(Boolean);
    var jahre=['alle',...new Set(archivMeta.map(function(b){return b._jahr;}))].sort(function(a,b){return b>a?1:-1;});
    var kws=[...new Set(archivMeta.filter(function(b){return filterJahr==='alle'||b._jahr===filterJahr;}).map(function(b){return b._kw;}))].sort();
    var monate=[...new Set(archivMeta.filter(function(b){return filterJahr==='alle'||b._jahr===filterJahr;}).map(function(b){return b._monat;}))];

    var gefiltert=archivMeta.filter(function(b){
      if(filterJahr!=='alle'&&b._jahr!==filterJahr)return false;
      if(filterView==='kw'&&filterKW!=='alle'&&b._kw!==filterKW)return false;
      if(filterView==='monat'&&filterMonat!=='alle'&&b._monat!==filterMonat)return false;
      return true;
    });

    var gruppen={};
    gefiltert.forEach(function(b){
      var key=b._jahr+' / '+(filterView==='kw'?b._kw:b._monat);
      if(!gruppen[key])gruppen[key]={label:key,berichte:[]};
      gruppen[key].berichte.push(b);
    });
    var gruppenList=Object.values(gruppen).sort(function(a,b){return b.label>a.label?1:-1;});

    var selS={padding:'7px 10px',border:'1.5px solid #e0ddd8',borderRadius:8,fontSize:13,background:'#fff',fontFamily:'inherit',width:'100%'};

    return(
    <div style={{height:'calc(100vh - 120px)',display:'flex',flexDirection:'column'}}>
      {/* Filter */}
      <div style={{padding:'12px 16px',background:'#f5f4f2',flexShrink:0,borderBottom:'1px solid #e8e5e0'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:'#888',marginBottom:3}}>JAHR</div>
            <select style={selS} value={filterJahr} onChange={function(e){setFilterJahr(e.target.value);setFilterKW('alle');setFilterMonat('alle');}}>
              {jahre.map(function(j){return <option key={j} value={j}>{j==='alle'?'Alle Jahre':j}</option>;})}
            </select>
          </div>
          <div>

  // ── Einstellungen Tab ──────────────────────────────────────────────
  function ProjekteMobileTab(){
    var [showNeu,setShowNeu]=useState(false);
    var [neuName,setNeuName]=useState('');
    var [neuOrt,setNeuOrt]=useState('');
    var [neuGeo,setNeuGeo]=useState([]);
    var [neuLat,setNeuLat]=useState(null);
    var [neuLon,setNeuLon]=useState(null);
    var [saving,setSaving]=useState(false);

    function searchGeo(q){
      if(!q||q.length<2){setNeuGeo([]);return;}
      fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=4&language=de')
        .then(r=>r.json()).then(d=>setNeuGeo(d.results||[])).catch(()=>{});
    }

    async function createProject(){
      if(!neuName.trim()){alert('Bitte Projektname eingeben');return;}
      setSaving(true);
      try{
        var payload={name:neuName.trim(),status:'aktiv'};
        if(neuOrt)payload.ort=neuOrt;
        if(neuLat)payload.lat=neuLat;
        if(neuLon)payload.lon=neuLon;
        await sb.insert('projekte',token,payload);
        await ladeProjekte();
        setShowNeu(false);setNeuName('');setNeuOrt('');setNeuGeo([]);setNeuLat(null);setNeuLon(null);
      }catch(e){alert('Fehler: '+e.message);}
      setSaving(false);
    }

    var card={background:'#fff',borderRadius:14,marginBottom:12,overflow:'hidden',boxShadow:'0 1px 6px rgba(0,0,0,.07)'};
    var inp={width:'100%',padding:'13px 14px',border:'1.5px solid #e0ddd8',borderRadius:10,fontSize:15,fontFamily:'inherit',boxSizing:'border-box',marginBottom:10,background:'#fafaf9'};

    return(
    <div style={{overflowY:'auto',height:'calc(100vh - 120px)',padding:'14px 16px'}}>
      {/* Header */}
      <div style={{background:'#1a1a1a',borderRadius:14,padding:'14px 16px',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontWeight:800,fontSize:16,color:'#fff'}}>Projekte</div>
          <div style={{fontSize:11,color:'#888',marginTop:2}}>{projekte.length} Projekte</div>
        </div>
        <button onClick={function(){setShowNeu(!showNeu);}}
          style={{padding:'9px 16px',background:'#CC0000',color:'#fff',border:'none',borderRadius:10,cursor:'pointer',fontWeight:700,fontSize:13,fontFamily:'inherit'}}>
          + Neu
        </button>
      </div>

      {/* Neues Projekt */}
      {showNeu&&(
      <div style={{...card,background:'#FFF8F0',border:'1px solid #f0ddb0',padding:'14px 16px'}}>
        <div style={{fontWeight:700,fontSize:14,color:'#8B6914',marginBottom:12}}>Neues Projekt</div>
        <input style={inp} placeholder="Projektname *" value={neuName} onChange={e=>setNeuName(e.target.value)}/>
        <input style={inp} placeholder="Ort (für Wetter)" value={neuOrt}
          onChange={function(e){setNeuOrt(e.target.value);searchGeo(e.target.value);}}/>
        {neuGeo.length>0&&(
          <div style={{background:'#fff',border:'1px solid #e0ddd8',borderRadius:8,marginBottom:10,overflow:'hidden'}}>
            {neuGeo.map(r=>(
              <div key={r.id} onClick={function(){setNeuOrt(r.name+(r.admin1?', '+r.admin1:''));setNeuLat(r.latitude);setNeuLon(r.longitude);setNeuGeo([]);}}
                style={{padding:'10px 14px',borderBottom:'1px solid #f5f4f2',fontSize:14,cursor:'pointer'}}>
                {r.name}{r.admin1?', '+r.admin1:''}{r.country?', '+r.country:''}
              </div>
            ))}
          </div>
        )}
        {neuLat&&<div style={{fontSize:12,color:'#2E7D32',marginBottom:10}}>📍 {neuLat.toFixed(3)}, {neuLon.toFixed(3)}</div>}
        <div style={{display:'flex',gap:8}}>
          <button onClick={function(){setShowNeu(false);}}
            style={{flex:1,padding:12,background:'#f5f4f2',color:'#555',border:'none',borderRadius:10,cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:600}}>
            Abbrechen
          </button>
          <button onClick={createProject} disabled={saving}
            style={{flex:2,padding:12,background:'#2E7D32',color:'#fff',border:'none',borderRadius:10,cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:700,opacity:saving?.7:1}}>
            {saving?'Erstelle...':'Projekt anlegen'}
          </button>
        </div>
      </div>
      )}

      {/* Projektliste */}
      {projekte.length===0&&!showNeu&&(
        <div style={{...card,padding:40,textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:12}}>📁</div>
          <div style={{fontWeight:600,color:'#999',marginBottom:6}}>Noch keine Projekte</div>
          <div style={{fontSize:13,color:'#bbb'}}>Tippe "+ Neu" um zu starten</div>
        </div>
      )}

      {projekte.map(function(p){
        var istAktiv=aktivProjekt&&aktivProjekt.id===p.id;
        return(
        <div key={p.id} style={{...card,border:istAktiv?'2px solid #CC0000':'2px solid transparent'}}>
          {/* Projekt Header */}
          <div style={{background:istAktiv?'#CC0000':'#f9f8f7',padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}
            onClick={function(){setAktivProjekt(p);ladeBlattNr(p.id);setMsgs([]);setTab('chat');}}>
            <div style={{width:38,height:38,borderRadius:10,background:istAktiv?'rgba(255,255,255,.2)':'#e8e5e0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>
              🏗
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:15,color:istAktiv?'#fff':'#1a1a1a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {istAktiv?'★ ':''}{p.name}
              </div>
              <div style={{fontSize:11,color:istAktiv?'rgba(255,255,255,.75)':'#888',marginTop:2}}>
                {p.bau_nr?'Bau-Nr. '+p.bau_nr+' · ':''}{p.ort||'Kein Ort'}
              </div>
            </div>
            <div style={{fontSize:11,padding:'4px 10px',borderRadius:8,background:istAktiv?'rgba(255,255,255,.2)':'#e8e5e0',color:istAktiv?'#fff':'#888',fontWeight:600,flexShrink:0}}>
              {istAktiv?'Aktiv':'→'}
            </div>
          </div>

          {/* Aktives Projekt: Aktionen */}
          {istAktiv&&(
          <div style={{padding:'12px 16px',background:'#fff',borderTop:'1px solid #f5f4f2'}}>
            <div style={{fontSize:12,color:'#888',marginBottom:10}}>
              📍 {p.ort||'Kein Ort'}{p.lat?' · Koordinaten gesetzt':''}
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={function(){projektArchivierenM(p);}}
                style={{flex:1,padding:11,background:'#f5f4f2',color:'#555',border:'1.5px solid #ddd',borderRadius:10,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600}}>
                Ausblenden
              </button>
              <button onClick={function(){projektLoeschenM(p);}}
                style={{flex:1,padding:11,background:'#fff0f0',color:'#CC0000',border:'1.5px solid #ffcccc',borderRadius:10,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600}}>
                Löschen
              </button>
            </div>
          </div>
          )}
        </div>
        );
      })}

      {/* Archivierte wiederherstellen */}
      <div style={{background:'#f9f8f7',border:'1px dashed #ddd',borderRadius:12,padding:'14px 16px',textAlign:'center',marginTop:4,cursor:'pointer'}}
        onClick={async function(){
          try{
            var alle=await sb.select('projekte',token,'order=erstellt_am.desc');
            var arch=Array.isArray(alle)?alle.filter(p=>p.status==='archiviert'):[];
            if(arch.length===0){alert('Keine ausgeblendeten Projekte.');return;}
            if(window.confirm(arch.length+' ausgeblendete Projekte wiederherstellen?')){
              for(var i=0;i<arch.length;i++) await sb.update('projekte',token,{status:'aktiv'},'id=eq.'+arch[i].id);
              ladeProjekte();
            }
          }catch(e){alert('Fehler: '+e.message);}
        }}>
        <div style={{fontSize:13,color:'#888'}}>📂 Ausgeblendete Projekte wiederherstellen</div>
      </div>
    </div>);
  }

  async function projektArchivierenM(p){
    if(!window.confirm('Projekt "'+p.name+'" ausblenden? (Wiederherstellbar)'))return;
    try{
      var aktTok=localStorage.getItem('mob_token')||token;
      try{var rt=await sb.refresh();if(rt)aktTok=rt;}catch{}
      await sb.update('projekte',aktTok,{status:'archiviert'},'id=eq.'+p.id);
      await ladeProjekte();
      setAktivProjekt(null);
      setMsgs(m=>[...m,{role:'assistant',content:'Projekt "'+p.name+'" ausgeblendet.'}]);
    }catch(e){alert('Fehler: '+e.message);}
  }
  async function projektLoeschenM(p){
    if(!window.confirm('Projekt "'+p.name+'" und ALLE Berichte löschen?\nNicht rückgängig!'))return;
    if(!window.confirm('Wirklich endgültig löschen?'))return;
    try{
      var aktTok=localStorage.getItem('mob_token')||token;
      try{var rt=await sb.refresh();if(rt)aktTok=rt;}catch{}
      await sb.remove('berichte',aktTok,'projekt_id=eq.'+p.id);
      await sb.remove('projekte',aktTok,'id=eq.'+p.id);
      await ladeProjekte();
      setAktivProjekt(null);
      setMsgs(m=>[...m,{role:'assistant',content:'Projekt "'+p.name+'" gelöscht.'}]);
    }catch(e){alert('Fehler: '+e.message);}
  }

  function EinstellungenTab(){
    var [name,setName]=useState(aktivProjekt?aktivProjekt.name:'');
    var [bauNr,setBauNr]=useState(aktivProjekt?aktivProjekt.bau_nr||'':'');
    var [ort,setOrt]=useState(aktivProjekt?aktivProjekt.ort||'':'');
    var [geo,setGeo]=useState([]);
    var [lat,setLat]=useState(aktivProjekt?aktivProjekt.lat||null:null);
    var [lon,setLon]=useState(aktivProjekt?aktivProjekt.lon||null:null);
    var [saved,setSaved]=useState(false);
    var inp={width:'100%',padding:'13px 16px',border:'1.5px solid #e0ddd8',borderRadius:12,fontSize:15,fontFamily:'inherit',boxSizing:'border-box',marginBottom:12,background:'#fff'};
    var lb={fontSize:12,fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:4};

    async function save(){
      if(!aktivProjekt||!token)return;
      try{var p={name};if(bauNr)p.bau_nr=bauNr;if(ort)p.ort=ort;if(lat)p.lat=lat;if(lon)p.lon=lon;var d=await sb.update('projekte',token,p,'id=eq.'+aktivProjekt.id);if(d){setAktivProjekt({...aktivProjekt,...p,...d});await ladeProjekte();}setSaved(true);setTimeout(function(){setSaved(false);},2000);}catch(e){alert('Fehler: '+e.message);}
    }

    return(
    <div style={{padding:'16px',overflowY:'auto',height:'calc(100vh - 120px)'}}>
      <div style={{background:'#fff',borderRadius:14,padding:'16px',marginBottom:16,boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:14,color:'#1a1a1a'}}>Projekt bearbeiten</div>
        <label style={lb}>Projektname / BVH</label>
        <input style={inp} value={name} onChange={e=>setName(e.target.value)}/>
        <label style={lb}>Bau-Nr.</label>
        <input style={inp} value={bauNr} onChange={e=>setBauNr(e.target.value)} placeholder="z.B. 7421341"/>
        <label style={lb}>Ort (für Wetter)</label>
        <input style={inp} value={ort} onChange={function(e){setOrt(e.target.value);if(e.target.value.length>1)fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(e.target.value)+'&count=5&language=de').then(r=>r.json()).then(d=>setGeo(d.results||[])).catch(()=>{});else setGeo([]);}} placeholder="z.B. München"/>
        {geo.length>0&&<div style={{background:'#fff',border:'1px solid #e0ddd8',borderRadius:10,marginBottom:12,overflow:'hidden'}}>
          {geo.map(r=><div key={r.id} onClick={function(){setOrt(r.name+(r.admin1?', '+r.admin1:''));setLat(r.latitude);setLon(r.longitude);setGeo([]);}}
            style={{padding:'11px 16px',cursor:'pointer',fontSize:14,borderBottom:'1px solid #f0efed'}}>
            {r.name}{r.admin1?', '+r.admin1:''}</div>)}
        </div>}
        {lat&&<div style={{fontSize:13,color:'#2E7D32',marginBottom:12}}>Koordinaten gesetzt</div>}
        <button onClick={save} style={{width:'100%',padding:15,background:saved?'#2E7D32':'#CC0000',color:'#fff',border:'none',borderRadius:12,cursor:'pointer',fontWeight:700,fontFamily:'inherit',fontSize:16,transition:'background .3s'}}>
          {saved?'Gespeichert!':'Speichern'}
        </button>
        <div style={{display:'flex',gap:8,marginTop:10}}>
          <button onClick={function(){if(aktivProjekt)projektArchivierenM(aktivProjekt);}}
            style={{flex:1,padding:12,background:'#f5f4f2',color:'#555',border:'1.5px solid #ddd',borderRadius:10,cursor:'pointer',fontWeight:600,fontFamily:'inherit',fontSize:13}}>
            Ausblenden
          </button>
          <button onClick={function(){if(aktivProjekt)projektLoeschenM(aktivProjekt);}}
            style={{flex:1,padding:12,background:'#fff0f0',color:'#CC0000',border:'1.5px solid #ffcccc',borderRadius:10,cursor:'pointer',fontWeight:600,fontFamily:'inherit',fontSize:13}}>
            Löschen
          </button>
        </div>
      </div>
      <div style={{background:'#fff',borderRadius:14,padding:'16px',marginBottom:16,boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:10}}>Konto</div>
        <div style={{fontSize:14,color:'#555',marginBottom:12}}>{user?user.email:''}</div>
        <button onClick={logout} style={{width:'100%',padding:13,background:'#f5f4f2',color:'#CC0000',border:'1.5px solid #ffcccc',borderRadius:12,cursor:'pointer',fontWeight:700,fontFamily:'inherit',fontSize:15}}>
          Abmelden
        </button>
      </div>
    </div>);
  }

          <button onClick={function(){setPdfVorschau(null);}}
            style={{padding:'8px 14px',background:'#333',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:15,fontFamily:'inherit'}}>
            ✕
          </button>
        </div>
        {/* Vorschau-Inhalt */}
        <div style={{flex:1,overflowY:'auto',background:'#f5f5f5',padding:16}}>
          <div style={{background:'#fff',borderRadius:8,padding:20,maxWidth:600,margin:'0 auto',boxShadow:'0 2px 12px rgba(0,0,0,.15)',fontFamily:'serif',fontSize:13}}>
            {/* Header Zeile */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12,paddingBottom:12,borderBottom:'2px solid #CC0000'}}>
              <div>
                <div style={{fontWeight:700,fontSize:18}}>Bautagebuch - Rohbau</div>
                <div style={{fontSize:11,color:'#555',marginTop:4}}>Baustelle: {aktivProjekt?aktivProjekt.name:''} · Bau-Nr.: {aktivProjekt?aktivProjekt.bau_nr||'':''}</div>
              </div>
              <div style={{textAlign:'right',fontSize:11}}>
                <div><strong>Blatt-Nr.:</strong> {blattNr}</div>
                <div><strong>Datum:</strong> {form.datum}</div>
              </div>
            </div>
            <div style={{fontSize:11,marginBottom:12}}><strong>Arbeitszeit:</strong> {form.arbeitszeit}</div>

            {/* Wetter */}
            {(form.temp7||form.niederschlag)&&<div style={{marginBottom:12,padding:'8px 10px',background:'#f8f8f8',borderLeft:'3px solid #CC0000',borderRadius:'0 4px 4px 0'}}>
              <div style={{fontWeight:700,fontSize:11,color:'#CC0000',marginBottom:4}}>WETTER</div>
              {form.temp7&&<div style={{fontSize:11}}>7h {form.temp7} · 12h {form.temp12} · 16h {form.temp16} · max {form.tempMax} · min {form.tempMin}</div>}
              {form.niederschlag&&<div style={{fontSize:11}}>{form.niederschlag} · {form.luftbewegung}</div>}
            </div>}

            {/* Arbeitskräfte */}
            <div style={{marginBottom:12,padding:'8px 10px',background:'#f8f8f8',borderLeft:'3px solid #CC0000',borderRadius:'0 4px 4px 0'}}>
              <div style={{fontWeight:700,fontSize:11,color:'#CC0000',marginBottom:6}}>ARBEITSKRÄFTE</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:12,fontSize:11}}>
                {Object.entries(form.arbeitskraefte||{}).filter(e=>e[1]).map(e=>(
                  <span key={e[0]}><strong>{e[0].charAt(0).toUpperCase()+e[0].slice(1)}:</strong> {e[1]}</span>
                ))}
              </div>
            </div>

            {/* Geräte */}
            {Object.values(form.geraete||{}).some(v=>v>0)&&<div style={{marginBottom:12,padding:'8px 10px',background:'#f8f8f8',borderLeft:'3px solid #CC0000',borderRadius:'0 4px 4px 0'}}>
              <div style={{fontWeight:700,fontSize:11,color:'#CC0000',marginBottom:6}}>GERÄTE</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:12,fontSize:11}}>
                {Object.entries(form.geraete||{}).filter(e=>e[1]>0).map(e=>(
                  <span key={e[0]}><strong>{e[0]}:</strong> {e[1]}</span>
                ))}
              </div>
            </div>}

            {/* Ausgeführte Arbeiten */}
            <div style={{marginBottom:12}}>
              <div style={{background:'#CC0000',color:'#fff',padding:'4px 8px',fontSize:11,fontWeight:700,marginBottom:6}}>AUSGEFÜHRTE ARBEITEN</div>
              {(form.ausgefuehrteArbeiten||'').split('\n').map((line,i)=>(
                <div key={i} style={{fontSize:12,borderBottom:'1px solid #eee',padding:'4px 0',minHeight:22}}>{line}</div>
              ))}
              {[...Array(Math.max(0,8-(form.ausgefuehrteArbeiten||'').split('\n').length))].map((_,i)=>(
                <div key={i} style={{borderBottom:'1px solid #eee',minHeight:22}}/>
              ))}
            </div>

            {/* Sonstiges */}
            {form.sonstiges&&<div style={{marginBottom:12}}>
              <div style={{background:'#CC0000',color:'#fff',padding:'4px 8px',fontSize:11,fontWeight:700,marginBottom:6}}>SONSTIGES / BESONDERE VORKOMMNISSE</div>
              <div style={{fontSize:12,padding:'4px 0'}}>{form.sonstiges}</div>
            </div>}

            {/* Besuche */}
            <div style={{marginBottom:12}}>
              <div style={{background:'#CC0000',color:'#fff',padding:'4px 8px',fontSize:11,fontWeight:700,marginBottom:6}}>BESUCHE</div>
              {form.besucheText&&<div style={{fontSize:12,padding:'4px 0',borderBottom:'1px solid #eee'}}>{form.besucheText}</div>}
              <div style={{borderBottom:'1px solid #eee',minHeight:22}}/>
            </div>

            {/* Unterschriften */}
            <div style={{display:'flex',justifyContent:'space-between',marginTop:20,paddingTop:12,borderTop:'1px solid #ccc',fontSize:11}}>
              <div><strong>Polier:</strong><br/>{form.besuche&&form.besuche.polier||''}<br/><div style={{borderBottom:'1px solid #333',width:100,marginTop:16}}/></div>
              <div><strong>Bauleiter:</strong><br/>{form.besuche&&form.besuche.bauleiter||''}<br/><div style={{borderBottom:'1px solid #333',width:100,marginTop:16}}/></div>
              <div><strong>Bauherr:</strong><br/>{form.besuche&&form.besuche.bauherr||''}<br/><div style={{borderBottom:'1px solid #333',width:100,marginTop:16}}/></div>
            </div>
          </div>
          <div style={{textAlign:'center',fontSize:11,color:'#999',margin:'12px 0'}}>
            Tippe "Bestätigen + PDF" um das fertige PDF zu erstellen und herunterzuladen
          </div>
        </div>
      </div>
      )}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);




</script>
</body>
</html>
