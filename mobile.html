<script type="text/babel">



const {useState,useEffect,useRef,useCallback}=React;

// ── Config (same as desktop) ─────────────────────────────────────
const SB_URL='https://dlypbcdoxlfyyavmrhlr.supabase.co';
const SB_KEY='sb_publishable_VI2Oei75votfVOgtuVIcmw_K5-lAeLi';

// ── Supabase helpers ──────────────────────────────────────────────
async function sbUpdateBericht(token,id,data){
  var r=await fetch(SB_URL+'/rest/v1/berichte?id=eq.'+id,{method:'PATCH',headers:{...sb._h(token),'Prefer':'return=representation'},body:JSON.stringify(data)});
  var d=await r.json();if(d&&d.message)throw new Error(d.message);return Array.isArray(d)?d[0]:d;
}
async function sbDeleteBericht(token,id){
  var r=await fetch(SB_URL+'/rest/v1/berichte?id=eq.'+id,{method:'DELETE',headers:sb._h(token)});
  if(!r.ok)throw new Error('Loeschen fehlgeschlagen');return true;
}

const sb={
  _h:(token)=>({'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(token||SB_KEY)}),
  async signIn(email,pw){const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:sb._h(null),body:JSON.stringify({email,password:pw})});return r.json();},
  async signUp(email,pw,name){const r=await fetch(SB_URL+'/auth/v1/signup',{method:'POST',headers:sb._h(null),body:JSON.stringify({email,password:pw,data:{full_name:name}})});return r.json();},
  async signOut(token){await fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:sb._h(token)});},
  async select(table,token,filter,cols){
    if(!cols)cols='*';if(!filter)filter='';
    const url=SB_URL+'/rest/v1/'+table+'?select='+cols+(filter?'&'+filter:'');
    const r=await fetch(url,{headers:{...sb._h(token),'Prefer':'return=representation'}});
    const d=await r.json();if(d&&d.message)throw new Error(d.message);
    return Array.isArray(d)?d:[];
  },
  async insert(table,token,data){
    const r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{...sb._h(token),'Prefer':'return=representation'},body:JSON.stringify(data)});
    const d=await r.json();if(d&&d.message)throw new Error(d.message);
    return Array.isArray(d)?d[0]:d;
  },
  async update(table,token,data,filter){
    const r=await fetch(SB_URL+'/rest/v1/'+table+'?'+filter,{method:'PATCH',headers:{...sb._h(token),'Prefer':'return=representation'},body:JSON.stringify(data)});
    const d=await r.json();if(d&&d.message)throw new Error(d.message);
    return Array.isArray(d)?d[0]:d;
  }
};

const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();};
const mkForm=()=>({datum:todayStr(),arbeitszeit:'07:00 - 16:00 Uhr',temp7:'',temp12:'',temp16:'',tempMax:'',tempMin:'',niederschlag:'',luftbewegung:'',arbeitskraefte:{polier:'',werkpolier:'',vorarbeiter:'',maurer:'',zimmerer:'',betonbauer:'',helfer:'',maschinenpersonal:'',azubis:''},geraete:{raupen:0,bagger:0,kraene:0,kompressor:0,verdGeraete:0,lkw:0,betonstahl:0,beton:0},besuche:{polier:'',bauleiter:'',bauherr:''},besucheText:'',nachunternehmer:'',ausgefuehrteArbeiten:'',sonstiges:'',anhangText:'',medien:[]});
function pruefeFehlend(f){var m=[];if(!f.ausgefuehrteArbeiten)m.push('Ausgeführte Arbeiten');if(!f.temp7)m.push('Temperatur');if(!f.luftbewegung)m.push('Luftbewegung');if(!f.besuche.polier)m.push('Polier');if(!f.besuche.bauleiter)m.push('Bauleiter');return m;}

const WMO={0:'Klar',1:'Überwiegend klar',2:'Teilweise bewölkt',3:'Bewölkt',45:'Neblig',51:'Nieselregen',61:'Leichter Regen',63:'Regen',65:'Starker Regen',71:'Schneefall',80:'Regenschauer',82:'Starke Schauer',95:'Gewitter'};
function getN(c){if([80,81,82].includes(c))return'Regenschauer';if([61,63,65].includes(c))return'Dauerregen';if([71,73,75].includes(c))return'Schneefall';return'';}
function getW(k){return k<5?'still':k<30?'mäßiger Wind':'starker Wind';}

async function callClaude(msgs){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:msgs})});
  const d=await r.json();return d.content&&d.content[0]?d.content[0].text:'';
}

// ── Login Screen ─────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [name,setName]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  async function submit(){
    if(!email||!pw){setErr('E-Mail und Passwort eingeben');return;}
    setLoading(true);setErr('');
    try{
      var res=mode==='login'?await sb.signIn(email,pw):await sb.signUp(email,pw,name);
      if(res.error||res.message){setErr(res.error_description||res.message||'Fehler');}
      else if(res.access_token){localStorage.setItem('sb_token',res.access_token);localStorage.setItem('sb_user',JSON.stringify(res.user));onLogin(res.access_token,res.user);}
      else setErr('Bitte E-Mail bestätigen');
    }catch(e){setErr('Verbindungsfehler');}
    setLoading(false);
  }

  return(
  <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#CC0000 0%,#8B0000 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
    <img src={LOGO_PNG} style={{width:80,height:80,objectFit:'contain',background:'#fff',borderRadius:16,padding:8,marginBottom:20,boxShadow:'0 8px 32px rgba(0,0,0,.3)'}}/>
    <div style={{color:'#fff',fontWeight:800,fontSize:26,marginBottom:4,letterSpacing:.5}}>Bautagebuch</div>
    <div style={{color:'rgba(255,255,255,.7)',fontSize:14,marginBottom:32}}>Riedel Bau GmbH</div>
    <div style={{background:'#fff',borderRadius:20,padding:24,width:'100%',maxWidth:380,boxShadow:'0 20px 60px rgba(0,0,0,.3)'}}>
      <div style={{display:'flex',background:'#f5f4f2',borderRadius:10,padding:3,marginBottom:20}}>
        {[['login','Anmelden'],['signup','Registrieren']].map(function(t){return(
          <button key={t[0]} onClick={function(){setMode(t[0]);setErr('');}}
            style={{flex:1,padding:'9px',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14,fontFamily:'inherit',
              background:mode===t[0]?'#CC0000':'transparent',color:mode===t[0]?'#fff':'#888',transition:'all .2s'}}>
            {t[1]}
          </button>
        );})}
      </div>
      {err&&<div style={{background:'#fff0f0',border:'1px solid #ffcccc',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#CC0000',marginBottom:12}}>{err}</div>}
      {mode==='signup'&&<input style={{width:'100%',padding:'13px 16px',border:'1.5px solid #e0ddd8',borderRadius:10,fontSize:15,fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}} placeholder="Vollständiger Name" value={name} onChange={e=>setName(e.target.value)}/>}
      <input style={{width:'100%',padding:'13px 16px',border:'1.5px solid #e0ddd8',borderRadius:10,fontSize:15,fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}} placeholder="E-Mail" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
      <input style={{width:'100%',padding:'13px 16px',border:'1.5px solid #e0ddd8',borderRadius:10,fontSize:15,fontFamily:'inherit',boxSizing:'border-box',marginBottom:16}} placeholder="Passwort" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
      <button onClick={submit} disabled={loading} style={{width:'100%',padding:15,background:'#CC0000',color:'#fff',border:'none',borderRadius:10,fontSize:16,fontWeight:700,cursor:'pointer',fontFamily:'inherit',opacity:loading?.7:1}}>
        {loading?'Laden...':(mode==='login'?'Anmelden':'Registrieren')}
      </button>
    </div>
  </div>);
}

  const [fehlend,setFehlend]=useState([]);
  const [berichtEditId,setBerichtEditId]=useState(null);
  const chatEnd=useRef(null);
  const histRef=useRef([]);

  function handleLogin(tok,usr){setToken(tok);setUser(usr);localStorage.setItem('sb_token',tok);localStorage.setItem('sb_user',JSON.stringify(usr));}
  async function logout(){if(token)await sb.signOut(token);localStorage.clear();setToken(null);setUser(null);}

  useEffect(function(){if(token)ladeProjekte();},[token]);
  useEffect(function(){if(chatEnd.current)chatEnd.current.scrollIntoView({behavior:'smooth'});},[msgs]);

  async function ladeProjekte(){
    try{var d=await sb.select('projekte',token,'order=erstellt_am.desc');if(Array.isArray(d)){setProjekte(d);if(d.length>0&&!aktivProjekt){setAktivProjekt(d[0]);setBlattNr(1);}}}catch(e){console.error(e);}
  }
  async function ladeBlattNr(pid){
    try{var d=await sb.select('berichte',token,'projekt_id=eq.'+pid+'&order=blatt_nr.desc&limit=1','blatt_nr');setBlattNr(Array.isArray(d)&&d[0]?d[0].blatt_nr+1:1);}catch(e){setBlattNr(1);}
  }

  async function fetchWetter(){
    if(!aktivProjekt||!aktivProjekt.lat)return;
    setWload(true);
    try{
      var r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+aktivProjekt.lat+'&longitude='+aktivProjekt.lon+'&hourly=temperature_2m,weathercode,windspeed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=Europe/Berlin&forecast_days=1');
      var d=await r.json();
      var code=d.hourly.weathercode[7]||0;
      var avg=(d.hourly.windspeed_10m[7]+d.hourly.windspeed_10m[12]+d.hourly.windspeed_10m[16])/3;
      var w={temp7:Math.round(d.hourly.temperature_2m[7])+'°C',temp12:Math.round(d.hourly.temperature_2m[12])+'°C',temp16:Math.round(d.hourly.temperature_2m[16])+'°C',tempMax:Math.round(d.daily.temperature_2m_max[0])+'°C',tempMin:Math.round(d.daily.temperature_2m_min[0])+'°C',niederschlag:getN(code),luftbewegung:getW(avg),wBeschreibung:WMO[code]||'Unbekannt'};
      setForm(f=>({...f,...w}));
      setMsgs(m=>[...m,{role:'assistant',content:'Wetter: '+w.wBeschreibung+' · '+w.temp7+'→'+w.tempMax+' · '+w.luftbewegung}]);
    }catch(e){}
    setWload(false);
  }

  const send=useCallback(async function(){
    if(!input.trim()||aiLoad)return;
    var um=input.trim();setInput('');
    setMsgs(m=>[...m,{role:'user',content:um}]);
    histRef.current.push({role:'user',content:um});
    setAiLoad(true);
    var sys='Bautagebuch-Assistent Riedel Bau. Projekt: '+(aktivProjekt?aktivProjekt.name:'')+'. Formular: '+JSON.stringify(form)+'. Antworte NUR als JSON: {"antwort":"Bestätigung","updates":{"ausgefuehrteArbeiten":"Text","sonstiges":"opt","besucheText":"opt","nachunternehmer":"opt","arbeitskraefte":{},"besuche":{},"geraete":{}}}';
    try{
      var raw=await callClaude([{role:'user',content:sys+'\n\nNachricht: '+um}]);
      var p;try{p=JSON.parse(raw.replace(/```json|```/g,''));}catch{p={antwort:'Notiert!',updates:{ausgefuehrteArbeiten:(form.ausgefuehrteArbeiten?form.ausgefuehrteArbeiten+'\n':'')+um}};}
      if(p.updates){var u=p.updates,f={...form};if(u.ausgefuehrteArbeiten!=null)f.ausgefuehrteArbeiten=u.ausgefuehrteArbeiten;if(u.sonstiges)f.sonstiges=u.sonstiges;if(u.besucheText)f.besucheText=u.besucheText;if(u.nachunternehmer)f.nachunternehmer=u.nachunternehmer;if(u.arbeitskraefte)f.arbeitskraefte={...form.arbeitskraefte,...u.arbeitskraefte};if(u.besuche)f.besuche={...form.besuche,...u.besuche};if(u.geraete)f.geraete={...form.geraete,...u.geraete};setForm(f);}
      setMsgs(m=>[...m,{role:'assistant',content:p.antwort||'Verstanden!'}]);
      histRef.current.push({role:'assistant',content:p.antwort});
      // Fehlende Felder prüfen
      setFehlend(pruefeFehlend(form));
    }catch{setMsgs(m=>[...m,{role:'assistant',content:'Verbindungsfehler.'}]);}
    setAiLoad(false);
  },[input,form,aiLoad,aktivProjekt]);

  async function startRec(){
    try{var stream=await navigator.mediaDevices.getUserMedia({audio:true});var mr=new MediaRecorder(stream);var chunks=[];mr.ondataavailable=e=>chunks.push(e.data);mr.onstop=async function(){stream.getTracks().forEach(t=>t.stop());var zt=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      setForm(f=>({...f,medien:[...(f.medien||[]),{typ:'sprache',dataUrl:null,beschreibung:'Aufnahme '+zt,transkription:''}]}));
      setMsgs(m=>[...m,{role:'assistant',content:'Sprachaufnahme gespeichert ('+zt+'). Tippe was du gesagt hast:'}]);};mr.start();setRecorder(mr);setRecording(true);}catch(e){alert('Mikrofon: '+e.message);}
  }
  function stopRec(){if(recorder){recorder.stop();setRecorder(null);}setRecording(false);}

  async function exportBericht(bestaetigen){
    if(!aktivProjekt||!token){alert('Kein Projekt gewählt');return;}
    var f=pruefeFehlend(form);
    if(f.length>0&&!bestaetigen){setFehlend(f);alert('Fehlende Felder: '+f.join(', '));return;}
    setSaveStatus('saving');
    try{
      var berichtData={projekt_id:aktivProjekt.id,blatt_nr:blattNr,datum:form.datum?form.datum.split('.').reverse().join('-'):new Date().toISOString().split('T')[0],arbeitszeit:form.arbeitszeit,temp_7h:form.temp7,temp_12h:form.temp12,temp_16h:form.temp16,temp_max:form.tempMax,temp_min:form.tempMin,niederschlag:form.niederschlag,luftbewegung:form.luftbewegung,ak_polier:form.arbeitskraefte.polier,ak_werkpolier:form.arbeitskraefte.werkpolier,ak_vorarbeiter:form.arbeitskraefte.vorarbeiter,ak_maurer:form.arbeitskraefte.maurer,ak_zimmerer:form.arbeitskraefte.zimmerer,ak_betonbauer:form.arbeitskraefte.betonbauer,ak_helfer:form.arbeitskraefte.helfer,ak_maschinenpersonal:form.arbeitskraefte.maschinenpersonal,ak_azubis:form.arbeitskraefte.azubis,g_raupen:parseInt(form.geraete.raupen)||0,g_bagger:parseInt(form.geraete.bagger)||0,g_kraene:parseInt(form.geraete.kraene)||0,g_kompressor:parseInt(form.geraete.kompressor)||0,g_verd_geraete:parseInt(form.geraete.verdGeraete)||0,g_lkw:parseInt(form.geraete.lkw)||0,g_betonstahl:parseInt(form.geraete.betonstahl)||0,g_beton:parseInt(form.geraete.beton)||0,nachunternehmer:form.nachunternehmer,ausgefuehrte_arbeiten:form.ausgefuehrteArbeiten,sonstiges:form.sonstiges,besuche_text:form.besucheText,polier_name:form.besuche.polier,bauleiter_name:form.besuche.bauleiter,bauherr_name:form.besuche.bauherr,status:bestaetigen?'bestaetigt':'entwurf',fehlende_felder:f,
        anhang_text:form.anhangText||'',
        medien_json:form.medien&&form.medien.length>0?JSON.stringify(form.medien.map(function(m){return{typ:m.typ,beschreibung:m.beschreibung||'',transkription:m.transkription||''};})):null
      };
      if(berichtEditId){
        await sbUpdateBericht(token,berichtEditId,berichtData);
        setBerichtEditId(null);
      } else {
        await sb.insert('berichte',token,berichtData);
      };
      setBlattNr(n=>n+1);
      setSaveStatus('ok');
      setMsgs(m=>[...m,{role:'assistant',content:'Blatt '+blattNr+(bestaetigen?' bestätigt':'als Entwurf')+' gespeichert!'}]);
      if(bestaetigen){setTimeout(function(){setForm(mkForm());setMsgs([]);histRef.current=[];},1500);}
    }catch(e){setSaveStatus('error');console.error(e);}
    setTimeout(()=>setSaveStatus(null),3000);
  }

  if(!token||!user)return <LoginScreen onLogin={handleLogin}/>;

  // ── Home Tab ─────────────────────────────────────────────────────
  function HomeTab(){
    return(
    <div style={{padding:'16px 16px 0'}}>
      {/* Projekt Card */}
      <div style={{background:'linear-gradient(135deg,#CC0000,#8B0000)',borderRadius:16,padding:'20px',marginBottom:16,color:'#fff',boxShadow:'0 4px 20px rgba(204,0,0,.3)'}}>
        <div style={{fontSize:12,opacity:.7,marginBottom:4,fontWeight:600,textTransform:'uppercase',letterSpacing:.5}}>Aktives Projekt</div>
        <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>{aktivProjekt?aktivProjekt.name:'Kein Projekt'}</div>
        <div style={{fontSize:13,opacity:.8}}>Blatt {blattNr} · {todayStr()}</div>
        {form.wBeschreibung&&<div style={{marginTop:10,background:'rgba(255,255,255,.15)',borderRadius:8,padding:'8px 12px',fontSize:13}}>
          {form.wBeschreibung} · {form.temp7} – {form.tempMax}
        </div>}
      </div>

      {/* Quick Actions */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        <button onClick={()=>setTab('chat')} style={{background:'#fff',border:'none',borderRadius:14,padding:'18px 16px',cursor:'pointer',textAlign:'left',boxShadow:'0 2px 8px rgba(0,0,0,.08)'}}>
          <div style={{fontSize:28,marginBottom:6}}>💬</div>
          <div style={{fontWeight:700,fontSize:15,color:'#1a1a1a'}}>Chat</div>
          <div style={{fontSize:12,color:'#888',marginTop:2}}>Einträge diktieren</div>
        </button>
        <button onClick={()=>setTab('form')} style={{background:'#fff',border:'none',borderRadius:14,padding:'18px 16px',cursor:'pointer',textAlign:'left',boxShadow:'0 2px 8px rgba(0,0,0,.08)'}}>
          <div style={{fontSize:28,marginBottom:6}}>📋</div>
          <div style={{fontWeight:700,fontSize:15,color:'#1a1a1a'}}>Formular</div>
          <div style={{fontSize:12,color:'#888',marginTop:2}}>Details ausfüllen</div>
        </button>
        <button onClick={fetchWetter} disabled={!aktivProjekt||!aktivProjekt.lat||wload} style={{background:'#fff',border:'none',borderRadius:14,padding:'18px 16px',cursor:'pointer',textAlign:'left',boxShadow:'0 2px 8px rgba(0,0,0,.08)',opacity:!aktivProjekt||!aktivProjekt.lat?.5:1}}>
          <div style={{fontSize:28,marginBottom:6}}>{wload?'⏳':'☁️'}</div>
          <div style={{fontWeight:700,fontSize:15,color:'#1a1a1a'}}>{wload?'Lädt...':'Wetter'}</div>
          <div style={{fontSize:12,color:'#888',marginTop:2}}>Automatisch laden</div>
        </button>
        <button onClick={()=>exportBericht(true)} disabled={saveStatus==='saving'} style={{background:saveStatus==='ok'?'#E8F5E9':'#CC0000',border:'none',borderRadius:14,padding:'18px 16px',cursor:'pointer',textAlign:'left',boxShadow:'0 2px 8px rgba(204,0,0,.2)',opacity:saveStatus==='saving'?.7:1}}>
          <div style={{fontSize:28,marginBottom:6}}>✅</div>
          <div style={{fontWeight:700,fontSize:15,color:saveStatus==='ok'?'#2E7D32':'#fff'}}>{saveStatus==='saving'?'Speichert...':saveStatus==='ok'?'Gespeichert!':'Bestätigen'}</div>
          <div style={{fontSize:12,color:saveStatus==='ok'?'#2E7D32':'rgba(255,255,255,.8)',marginTop:2}}>Bericht abschließen</div>
        </button>
      </div>

      {/* Fehlende Felder */}
      {fehlend.length>0&&<div style={{background:'#FFF8F0',border:'1px solid #F0DDB0',borderRadius:12,padding:'12px 16px',marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:13,color:'#8B6914',marginBottom:6}}>Fehlende Angaben:</div>
        {fehlend.map(f=><div key={f} onClick={()=>setTab('form')} style={{fontSize:13,color:'#CC0000',padding:'4px 0',borderBottom:'1px solid #f0e8d0',cursor:'pointer'}}>→ {f}</div>)}
      </div>}

      {/* Projekte - immer sichtbar */}
      <div style={{background:'#fff',borderRadius:14,padding:'14px 16px',boxShadow:'0 2px 8px rgba(0,0,0,.08)'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:.5,marginBottom:10}}>Projekte</div>
        {projekte.length===0&&<div style={{fontSize:13,color:'#aaa',padding:'8px 0',textAlign:'center'}}>Noch keine Projekte.</div>}
        {projekte.map(function(p){return(
          <button key={p.id} onClick={function(){setAktivProjekt(p);setBlattNr(1);setForm(mkForm());setMsgs([]);}}
            style={{width:'100%',textAlign:'left',background:aktivProjekt&&aktivProjekt.id===p.id?'#FFF0F0':'transparent',border:'none',borderRadius:8,padding:'10px 12px',cursor:'pointer',fontFamily:'inherit',marginBottom:4,display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:8,height:8,borderRadius:'50%',flexShrink:0,background:aktivProjekt&&aktivProjekt.id===p.id?'#CC0000':'#ddd'}}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14,color:'#1a1a1a'}}>{p.name}</div>
              <div style={{fontSize:11,color:'#888'}}>{p.bau_nr||'Keine Bau-Nr.'}</div>
            </div>
            {aktivProjekt&&aktivProjekt.id===p.id&&<span style={{fontSize:11,color:'#CC0000',fontWeight:700}}>Aktiv</span>}
          </button>
        );})}
        <button onClick={async function(){
          var n=window.prompt('Projektname:');
          if(!n||!n.trim())return;
          try{
            var d=await sb.insert('projekte',token,{name:n.trim(),status:'aktiv'});
            await ladeProjekte();
            if(d&&d.id){setAktivProjekt(d);}
            setTab('einstellungen');
          }catch(e){alert('Fehler: '+e.message);}
        }} style={{width:'100%',padding:'12px',background:'transparent',border:'1.5px dashed #CC0000',borderRadius:8,cursor:'pointer',fontFamily:'inherit',fontSize:14,color:'#CC0000',fontWeight:600,marginTop:4}}>
          + Neues Projekt anlegen
        </button>
      </div>
    </div>);
  }

  // ── Chat Tab ──────────────────────────────────────────────────────
  function ChatTab(){
    return(
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 120px)'}}>
      <div style={{flex:1,overflowY:'auto',padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}}>
        {msgs.length===0&&<div style={{margin:'auto',textAlign:'center',color:'#ccc',paddingTop:60}}>
          <div style={{fontSize:48,marginBottom:12}}>💬</div>
          <div style={{fontWeight:600,fontSize:16,color:'#aaa'}}>Was wurde heute gemacht?</div>
          <div style={{fontSize:13,color:'#ccc',marginTop:8,lineHeight:1.6}}>Schreib oder diktiere — ich fülle das Formular automatisch aus</div>
        </div>}
        {msgs.map(function(m,i){return(
          <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',gap:8,alignItems:'flex-end'}}>
            {m.role==='assistant'&&<div style={{width:28,height:28,borderRadius:'50%',background:'#CC0000',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',flexShrink:0,fontWeight:700}}>B</div>}
            <div style={{maxWidth:'80%',padding:'10px 14px',fontSize:15,lineHeight:1.5,whiteSpace:'pre-wrap',
              borderRadius:m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',
              background:m.role==='user'?'#CC0000':'#fff',
              color:m.role==='user'?'#fff':'#1a1a1a',
              boxShadow:'0 1px 4px rgba(0,0,0,.08)'}}>
              {m.content}
            </div>
          </div>
        );})}
        {aiLoad&&<div style={{display:'flex',gap:4,padding:'8px 14px',background:'#fff',borderRadius:'18px 18px 18px 4px',width:'fit-content',boxShadow:'0 1px 4px rgba(0,0,0,.08)'}}>
          {[0,1,2].map(i=><div key={i} className="dot" style={{animationDelay:i*.2+'s'}}/>)}
        </div>}
        <div ref={chatEnd}/>
      </div>
      {/* Input Bar */}
      <div style={{padding:'8px 12px',background:'#fff',borderTop:'1px solid #f0efed',display:'flex',alignItems:'center',gap:8,paddingBottom:'max(8px,env(safe-area-inset-bottom))'}}>
        <label style={{width:44,height:44,background:'#f5f4f2',borderRadius:22,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:20,flexShrink:0}}>
          📷<input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={function(e){
                if(!e.target.files[0])return;
                var rd=new FileReader(),fn=e.target.files[0].name||'Foto';
                rd.onload=function(ev){
                  setForm(function(f){return {...f,medien:[...(f.medien||[]),{typ:'foto',dataUrl:ev.target.result,beschreibung:fn,transkription:''}]};});
                  setMsgs(function(m){return [...m,{role:'assistant',content:'Foto gespeichert: '+fn+'. Erscheint im Anhang.'}];});
                };
                rd.readAsDataURL(e.target.files[0]);
              }}/>
        </label>
        <button onClick={recording?stopRec:startRec}
          style={{width:44,height:44,borderRadius:22,border:'none',background:recording?'#CC0000':'#f5f4f2',color:recording?'#fff':'#555',fontSize:20,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          🎤
        </button>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
          placeholder={recording?'Aufnahme läuft...':'Nachricht eingeben...'}
          disabled={recording}
          style={{flex:1,padding:'10px 16px',border:'1.5px solid #e0ddd8',borderRadius:22,fontSize:15,fontFamily:'inherit',background:'#f9f8f7',outline:'none'}}/>
        <button onClick={send} disabled={aiLoad||!input.trim()||recording}
          style={{width:44,height:44,borderRadius:22,border:'none',background:'#CC0000',color:'#fff',fontSize:18,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',opacity:aiLoad||!input.trim()?.5:1}}>
          ↑
        </button>
      </div>
    </div>);
  }

  // ── Formular Tab (kompakt mobile) ─────────────────────────────────

    var GF=[['raupen','Raupen'],['bagger','Bagger'],['kraene','Kräne'],['kompressor','Kompressor'],['verdGeraete','Verd. Geräte'],['lkw','LKW'],['betonstahl','Betonstahl'],['beton','Beton']];

              <span style={{fontSize:13,color:'#2E7D32',fontWeight:700}}>Bearbeitungsmodus</span>

                    <div style={{fontSize:9,padding:'2px 4px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#666'}}>{m.beschreibung||m.typ}</div>

  // ── Archiv Tab ─────────────────────────────────────────────────
  function berichtBearbeitenM(b){
    var f={
      datum:b.datum?new Date(b.datum).toLocaleDateString('de-DE'):'',
      arbeitszeit:b.arbeitszeit||'07:00 - 16:00 Uhr',
      temp7:b.temp_7h||'',temp12:b.temp_12h||'',temp16:b.temp_16h||'',
      tempMax:b.temp_max||'',tempMin:b.temp_min||'',
      niederschlag:b.niederschlag||'',luftbewegung:b.luftbewegung||'',
      arbeitskraefte:{polier:b.ak_polier||'',werkpolier:b.ak_werkpolier||'',vorarbeiter:b.ak_vorarbeiter||'',
        maurer:b.ak_maurer||'',zimmerer:b.ak_zimmerer||'',betonbauer:b.ak_betonbauer||'',
        helfer:b.ak_helfer||'',maschinenpersonal:b.ak_maschinenpersonal||'',azubis:b.ak_azubis||''},
      geraete:{raupen:b.g_raupen_anzahl||0,bagger:b.g_bagger_anzahl||0,kraene:b.g_kraene_anzahl||0,
        kompressor:b.g_kompressor_anzahl||0,verdGeraete:b.g_verd_geraete_anzahl||0,
        lkw:b.g_lkw_anzahl||0,betonstahl:b.g_betonstahl_anzahl||0,beton:b.g_beton_anzahl||0},
      besuche:{polier:b.polier_name||'',bauleiter:b.bauleiter_name||'',bauherr:b.bauherr_name||''},
      besucheText:b.besuche_text||'',nachunternehmer:b.nachunternehmer||'',
      ausgefuehrteArbeiten:b.ausgefuehrte_arbeiten||'',sonstiges:b.sonstiges||'',
      anhangText:b.anhang_text||'',
      medien:b.medien_json?JSON.parse(b.medien_json):[]
    };
    setBerichtEditId(b.id);
    setBlattNr(b.blatt_nr);
    setForm(f);
    setTab('form');
    setMsgs(function(m){return [...m,{role:'assistant',content:'Bericht Blatt '+b.blatt_nr+' geladen.'}];});
  }

  async function berichtLoeschenM(id,blattNr){
    if(!window.confirm('Bericht Blatt '+blattNr+' wirklich loeschen?'))return;
    try{
      var aktToken=token;
      try{var refreshed=await sb.refresh();if(refreshed)aktToken=refreshed;}catch(e2){}
      await sbDeleteBericht(aktToken,id);
      setMsgs(function(m){return [...m,{role:'assistant',content:'Bericht Blatt '+blattNr+' geloescht.'}];});
    }catch(e){
      if(e.message&&e.message.toLowerCase().includes('jwt')){
        alert('Sitzung abgelaufen. Bitte neu anmelden.');
      } else {
        alert('Fehler beim Loeschen: '+e.message);
      }
    }
  }

  function ArchivTab(){
    var [archiv,setArchiv]=useState([]);
    var [loading,setLoading]=useState(true);
    var [filterProjekt,setFilterProjekt]=useState('alle');
    var [filterJahr,setFilterJahr]=useState('alle');
    var [filterView,setFilterView]=useState('kw');
    var [filterKW,setFilterKW]=useState('alle');
    var [filterMonat,setFilterMonat]=useState('alle');

    var MONATE=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

    useEffect(function(){
      if(!token)return;
      setLoading(true);
      sb.select('berichte',token,'order=datum.desc,blatt_nr.desc').then(function(d){
        if(Array.isArray(d))setArchiv(d);
        setLoading(false);
      }).catch(function(){setLoading(false);});
    },[token]);

    // Berechne Meta-Daten
    var archivMeta=archiv.map(function(b){
      var d=b.datum?new Date(b.datum):new Date();
      var kw=Math.ceil(((d-new Date(d.getFullYear(),0,1))/86400000+new Date(d.getFullYear(),0,1).getDay()+1)/7);
      return {...b,_jahr:String(d.getFullYear()),_kw:'KW'+String(kw).padStart(2,'0'),_monat:MONATE[d.getMonth()]};
    });

    var projekte=['alle',...new Set(archivMeta.map(function(b){return aktivProjekt?aktivProjekt.name:'';}))].filter(Boolean);
    var jahre=['alle',...new Set(archivMeta.map(function(b){return b._jahr;}))].sort(function(a,b){return b>a?1:-1;});
    var kws=[...new Set(archivMeta.filter(function(b){return filterJahr==='alle'||b._jahr===filterJahr;}).map(function(b){return b._kw;}))].sort();
    var monate=[...new Set(archivMeta.filter(function(b){return filterJahr==='alle'||b._jahr===filterJahr;}).map(function(b){return b._monat;}))];

    var gefiltert=archivMeta.filter(function(b){
      if(filterJahr!=='alle'&&b._jahr!==filterJahr)return false;
      if(filterView==='kw'&&filterKW!=='alle'&&b._kw!==filterKW)return false;
      if(filterView==='monat'&&filterMonat!=='alle'&&b._monat!==filterMonat)return false;
      return true;
    });

    var gruppen={};
    gefiltert.forEach(function(b){
      var key=b._jahr+' / '+(filterView==='kw'?b._kw:b._monat);
      if(!gruppen[key])gruppen[key]={label:key,berichte:[]};
      gruppen[key].berichte.push(b);
    });
    var gruppenList=Object.values(gruppen).sort(function(a,b){return b.label>a.label?1:-1;});

    var selS={padding:'7px 10px',border:'1.5px solid #e0ddd8',borderRadius:8,fontSize:13,background:'#fff',fontFamily:'inherit',width:'100%'};

    return(
    <div style={{height:'calc(100vh - 120px)',display:'flex',flexDirection:'column'}}>
      {/* Filter */}
      <div style={{padding:'12px 16px',background:'#f5f4f2',flexShrink:0,borderBottom:'1px solid #e8e5e0'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:'#888',marginBottom:3}}>JAHR</div>
            <select style={selS} value={filterJahr} onChange={function(e){setFilterJahr(e.target.value);setFilterKW('alle');setFilterMonat('alle');}}>
              {jahre.map(function(j){return <option key={j} value={j}>{j==='alle'?'Alle Jahre':j}</option>;})}
            </select>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:'#888',marginBottom:3}}>ANSICHT</div>
            <div style={{display:'flex',gap:4}}>
              <button onClick={function(){setFilterView('kw');setFilterKW('alle');}} style={{flex:1,padding:'7px',border:'none',borderRadius:8,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:700,background:filterView==='kw'?'#CC0000':'#e0ddd8',color:filterView==='kw'?'#fff':'#555'}}>KW</button>
              <button onClick={function(){setFilterView('monat');setFilterMonat('alle');}} style={{flex:1,padding:'7px',border:'none',borderRadius:8,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:700,background:filterView==='monat'?'#CC0000':'#e0ddd8',color:filterView==='monat'?'#fff':'#555'}}>Monat</button>
            </div>
          </div>
        </div>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:'#888',marginBottom:3}}>{filterView==='kw'?'KALENDERWOCHE':'MONAT'}</div>
          <select style={selS} value={filterView==='kw'?filterKW:filterMonat}
            onChange={function(e){if(filterView==='kw')setFilterKW(e.target.value);else setFilterMonat(e.target.value);}}>
            <option value="alle">Alle</option>
            {(filterView==='kw'?kws:monate).map(function(x){return <option key={x} value={x}>{x}</option>;})}
          </select>
        </div>
        <div style={{fontSize:12,color:'#888',marginTop:6}}>{gefiltert.length} Berichte</div>
      </div>
      {/* Liste */}
      <div style={{flex:1,overflowY:'auto',padding:'12px 16px'}}>
        {loading&&<div style={{textAlign:'center',color:'#aaa',paddingTop:40}}>Lädt...</div>}
        {!loading&&gruppenList.length===0&&<div style={{textAlign:'center',paddingTop:60,color:'#aaa'}}>
          <div style={{fontSize:48,marginBottom:12}}>📂</div>
          <div style={{fontWeight:600,color:'#999'}}>Keine Berichte gefunden</div>
        </div>}
        {gruppenList.map(function(gruppe){return(
          <div key={gruppe.label} style={{marginBottom:16}}>
            <div style={{background:'#CC0000',color:'#fff',borderRadius:'10px 10px 0 0',padding:'8px 14px',fontWeight:700,fontSize:13}}>
              {gruppe.label} <span style={{fontWeight:400,fontSize:12,opacity:.8}}>({gruppe.berichte.length})</span>
            </div>
            <div style={{background:'#fff',borderRadius:'0 0 10px 10px',boxShadow:'0 2px 8px rgba(0,0,0,.06)'}}>
              {gruppe.berichte.map(function(b){return(
                <div key={b.id} style={{padding:'12px 14px',borderBottom:'1px solid #f5f4f2'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:b.status==='bestaetigt'?'#2E7D32':'#aaa',flexShrink:0}}/>
                    <span style={{fontWeight:700,fontSize:14}}>Blatt {b.blatt_nr}</span>
                    <span style={{fontSize:12,color:'#888'}}>{b.datum?new Date(b.datum).toLocaleDateString('de-DE'):''}</span>
                    <span style={{marginLeft:'auto',fontSize:11,padding:'2px 8px',borderRadius:8,background:b.status==='bestaetigt'?'#E8F5E9':'#f5f5f5',color:b.status==='bestaetigt'?'#2E7D32':'#888',fontWeight:600}}>
                      {b.status==='bestaetigt'?'Bestätigt':'Entwurf'}
                    </span>
                  </div>
                  <div style={{fontSize:13,color:'#555',lineHeight:1.5,marginLeft:16}}>
                    {(b.ausgefuehrte_arbeiten||'Keine Arbeiten').substring(0,80)}{(b.ausgefuehrte_arbeiten||'').length>80?'...':''}
                  </div>
                  {b.fehlende_felder&&b.fehlende_felder.length>0&&<div style={{fontSize:11,color:'#CC0000',marginTop:4,marginLeft:16}}>Fehlend: {b.fehlende_felder.join(', ')}</div>}
                  <div style={{display:'flex',gap:8,marginTop:10}}>
                    <button onClick={function(){berichtBearbeitenM(b);}} style={{flex:1,padding:'9px',background:'#2E7D32',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>Bearbeiten</button>
                    <button onClick={function(){berichtLoeschenM(b.id,b.blatt_nr);}} style={{flex:1,padding:'9px',background:'#CC0000',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>Loeschen</button>
                  </div>
                </div>
              );})}
            </div>
          </div>
        );})}
      </div>
    </div>);
  }

  // ── Einstellungen Tab ──────────────────────────────────────────────
  function EinstellungenTab(){
    var [name,setName]=useState(aktivProjekt?aktivProjekt.name:'');
    var [bauNr,setBauNr]=useState(aktivProjekt?aktivProjekt.bau_nr||'':'');
    var [ort,setOrt]=useState(aktivProjekt?aktivProjekt.ort||'':'');
    var [geo,setGeo]=useState([]);
    var [lat,setLat]=useState(aktivProjekt?aktivProjekt.lat||null:null);
    var [lon,setLon]=useState(aktivProjekt?aktivProjekt.lon||null:null);
    var [saved,setSaved]=useState(false);
    var inp={width:'100%',padding:'13px 16px',border:'1.5px solid #e0ddd8',borderRadius:12,fontSize:15,fontFamily:'inherit',boxSizing:'border-box',marginBottom:12,background:'#fff'};
    var lb={fontSize:12,fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:4};

    async function save(){
      if(!aktivProjekt||!token)return;
      try{var p={name};if(bauNr)p.bau_nr=bauNr;if(ort)p.ort=ort;if(lat)p.lat=lat;if(lon)p.lon=lon;var d=await sb.update('projekte',token,p,'id=eq.'+aktivProjekt.id);if(d){setAktivProjekt({...aktivProjekt,...p,...d});await ladeProjekte();}setSaved(true);setTimeout(function(){setSaved(false);},2000);}catch(e){alert('Fehler: '+e.message);}
    }

    return(
    <div style={{padding:'16px',overflowY:'auto',height:'calc(100vh - 120px)'}}>
      <div style={{background:'#fff',borderRadius:14,padding:'16px',marginBottom:16,boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:14,color:'#1a1a1a'}}>Projekt bearbeiten</div>
        <label style={lb}>Projektname / BVH</label>
        <input style={inp} value={name} onChange={e=>setName(e.target.value)}/>
        <label style={lb}>Bau-Nr.</label>
        <input style={inp} value={bauNr} onChange={e=>setBauNr(e.target.value)} placeholder="z.B. 7421341"/>
        <label style={lb}>Ort (für Wetter)</label>
        <input style={inp} value={ort} onChange={function(e){setOrt(e.target.value);if(e.target.value.length>1)fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(e.target.value)+'&count=5&language=de').then(r=>r.json()).then(d=>setGeo(d.results||[])).catch(()=>{});else setGeo([]);}} placeholder="z.B. München"/>
        {geo.length>0&&<div style={{background:'#fff',border:'1px solid #e0ddd8',borderRadius:10,marginBottom:12,overflow:'hidden'}}>
          {geo.map(r=><div key={r.id} onClick={function(){setOrt(r.name+(r.admin1?', '+r.admin1:''));setLat(r.latitude);setLon(r.longitude);setGeo([]);}}
            style={{padding:'11px 16px',cursor:'pointer',fontSize:14,borderBottom:'1px solid #f0efed'}}>
            {r.name}{r.admin1?', '+r.admin1:''}</div>)}
        </div>}
        {lat&&<div style={{fontSize:13,color:'#2E7D32',marginBottom:12}}>Koordinaten gesetzt</div>}
        <button onClick={save} style={{width:'100%',padding:15,background:saved?'#2E7D32':'#CC0000',color:'#fff',border:'none',borderRadius:12,cursor:'pointer',fontWeight:700,fontFamily:'inherit',fontSize:16,transition:'background .3s'}}>
          {saved?'Gespeichert!':'Speichern'}
        </button>
      </div>
      <div style={{background:'#fff',borderRadius:14,padding:'16px',marginBottom:16,boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:10}}>Konto</div>
        <div style={{fontSize:14,color:'#555',marginBottom:12}}>{user?user.email:''}</div>
        <button onClick={logout} style={{width:'100%',padding:13,background:'#f5f4f2',color:'#CC0000',border:'1.5px solid #ffcccc',borderRadius:12,cursor:'pointer',fontWeight:700,fontFamily:'inherit',fontSize:15}}>
          Abmelden
        </button>
      </div>
    </div>);
  }

  var tabs=[
    {id:'home',icon:'🏠',label:'Start'},
    {id:'chat',icon:'💬',label:'Chat'},
    {id:'form',icon:'📋',label:'Formular'},
    {id:'archiv',icon:'📂',label:'Archiv'},

    <div style={{background:'#CC0000',color:'#fff',padding:'10px 16px',paddingTop:'max(10px,env(safe-area-inset-top))',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
      <img src={LOGO_PNG} style={{width:30,height:30,objectFit:'contain',background:'#fff',borderRadius:6,padding:2}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:800,fontSize:15,letterSpacing:.3}}>BAUTAGEBUCH</div>
        <div style={{fontSize:11,opacity:.8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{aktivProjekt?aktivProjekt.name:'Kein Projekt'} · Blatt {blattNr}</div>
      </div>
      {saveStatus==='saving'&&<div style={{fontSize:11,background:'rgba(255,255,255,.2)',borderRadius:5,padding:'3px 8px'}}>Speichert...</div>}
      {saveStatus==='ok'&&<div style={{fontSize:11,background:'rgba(46,125,50,.5)',borderRadius:5,padding:'3px 8px'}}>Gespeichert</div>}
    </div>

    {/* Content */}
    <div style={{flex:1,overflow:'hidden',background:'#F5F4F2'}}>
      {tab==='home'&&<div style={{overflowY:'auto',height:'100%',paddingBottom:16}}><HomeTab/></div>}
      {tab==='chat'&&<ChatTab/>}
      {tab==='form'&&<FormTab/>}
      {tab==='archiv'&&<ArchivTab/>}
      {tab==='einstellungen'&&<EinstellungenTab/>}
    </div>

    {/* Bottom Navigation */}
    <div style={{background:'#fff',borderTop:'1px solid #f0efed',display:'flex',paddingBottom:'env(safe-area-inset-bottom)',flexShrink:0,boxShadow:'0 -2px 12px rgba(0,0,0,.06)'}}>
      {tabs.map(function(t){return(
        <button key={t.id} onClick={function(){setTab(t.id);}} style={{flex:1,padding:'8px 4px',border:'none',background:'transparent',cursor:'pointer',fontFamily:'inherit',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <span style={{fontSize:22,lineHeight:1}}>{t.icon}</span>
          <span style={{fontSize:10,fontWeight:tab===t.id?700:500,color:tab===t.id?'#CC0000':'#aaa',transition:'color .15s'}}>{t.label}</span>
          {tab===t.id&&<div style={{width:4,height:4,borderRadius:2,background:'#CC0000',marginTop:-2}}/>}
        </button>
      );})}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);



</script>
</body>
</html>
